<style>
:root {
  --bg: #F6F7FB; --bg-dark: #181B34; --bg-card: #FFFFFF;
  --accent: #6161FF; --accent-light: #ECECFF; --accent-hover: #4E4ED9;
  --border: #E6E9EF; --border-light: #F0F1F5;
  --text: #323338; --text-sec: #676879; --text-muted: #A1A4B1;
  --green: #00C875; --green-bg: #E0FFF0;
  --amber: #FDAB3D; --amber-bg: #FFF4E0;
  --red: #E2445C; --red-bg: #FFE4E8;
  --blue: #0086C0; --purple: #A25DDC; --pink: #FF158A;
  --radius: 8px; --shadow-sm: 0 1px 4px rgba(0,0,0,.06); --shadow-md: 0 4px 16px rgba(0,0,0,.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Figtree',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.mono { font-family:'JetBrains Mono',monospace; }

/* Header */
.header { background:var(--bg-dark); padding:18px 24px 16px; }
.header-inner { max-width:800px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
.header h1 { font-size:17px; font-weight:700; color:#fff; letter-spacing:-.02em; }
.header .sub { color:rgba(255,255,255,.45); font-size:11px; margin-top:2px; }
.sync-badge { font-size:9px; font-weight:600; margin-left:8px; }

/* Quick input */
.quick-input-wrap { max-width:800px; margin:-20px auto 16px; padding:0 16px; position:relative; z-index:10; }
.quick-input-card { background:var(--bg-card); border-radius:12px; padding:12px 16px; box-shadow:var(--shadow-md); border:1.5px solid var(--border); display:flex; gap:10px; align-items:center; }
.quick-input { flex:1; border:none; outline:none; font-size:14px; font-family:inherit; color:var(--text); background:transparent; }
.quick-input::placeholder { color:var(--text-muted); }
.quick-status { padding:4px 10px; border-radius:6px; border:1px solid var(--border); font-size:11px; font-family:inherit; color:var(--text-sec); background:var(--bg); cursor:pointer; outline:none; }
.quick-btn { padding:6px 16px; border-radius:8px; border:none; background:var(--accent); color:#fff; font-size:12px; font-weight:600; font-family:inherit; cursor:pointer; transition:background .15s; }
.quick-btn:hover { background:var(--accent-hover); }

/* Buttons */
.btn { padding:6px 14px; border-radius:var(--radius); border:none; cursor:pointer; font-weight:600; font-size:12px; font-family:inherit; transition:all .15s; }
.btn:hover { opacity:.88; }
.btn-accent { background:var(--accent); color:#fff; }
.btn-green { background:var(--green); color:#fff; }
.btn-red { background:var(--red); color:#fff; }
.btn-ghost { background:transparent; color:var(--text-sec); border:1px solid var(--border); }
.btn-sm { padding:4px 10px; font-size:11px; }
.btn-tiny { background:none; border:none; color:var(--text-muted); font-size:10px; cursor:pointer; font-family:inherit; }
.btn-tiny:hover { color:var(--text-sec); }

/* Filters */
.main { max-width:800px; margin:0 auto; padding:0 16px 24px; }
.filters { display:flex; gap:4px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
.filter-btn { padding:4px 12px; border-radius:20px; border:1.5px solid var(--border); background:var(--bg-card); color:var(--text-sec); font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; }
.filter-btn.active { border-color:var(--accent); background:var(--accent); color:#fff; }

/* Selection bar */
.sel-bar { display:flex; align-items:center; gap:8px; margin-bottom:10px; padding:8px 14px; background:var(--red-bg); border-radius:var(--radius); border:1px solid rgba(226,68,92,.2); font-size:11px; }

/* Cards */
.card-list { display:flex; flex-direction:column; gap:3px; }
.card-row { display:flex; align-items:flex-start; transition:opacity 2.8s ease-out; }
.card-row.fading { opacity:.15; }
.card-row.proj-done { opacity:.45; }
.card-check { width:32px; padding-top:11px; display:flex; align-items:flex-start; justify-content:center; cursor:pointer; flex-shrink:0; }
.cb { width:16px; height:16px; border-radius:50%; border:2px solid var(--border); background:var(--bg-card); display:flex; align-items:center; justify-content:center; font-size:9px; color:#fff; font-weight:700; transition:all .2s; cursor:pointer; }
.cb.checked { border-color:var(--green); background:var(--green); }
.cb-sm { width:14px; height:14px; border-radius:4px; border:2px solid var(--border); background:var(--bg-card); display:flex; align-items:center; justify-content:center; font-size:8px; color:#fff; font-weight:700; transition:all .2s; cursor:pointer; flex-shrink:0; }
.cb-sm.checked { border-color:var(--green); background:var(--green); }
.card { flex:1; background:var(--bg-card); border-radius:var(--radius); padding:10px 14px; border:1px solid var(--border); cursor:pointer; transition:box-shadow .15s,border-color .15s; box-shadow:var(--shadow-sm); }
.card:hover { box-shadow:var(--shadow-md); border-color:var(--accent); }
.card.selected { background:#F8F0FF; border-color:var(--purple); }
.card-title { font-size:13px; font-weight:600; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.card-title.done { text-decoration:line-through; color:var(--text-muted); }
.pill { display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:600; white-space:nowrap; flex-shrink:0; }
.progress-bg { width:40px; height:4px; border-radius:2px; background:var(--border-light); overflow:hidden; }
.progress-fill { height:100%; border-radius:2px; transition:width .3s; }

/* Inline tasks */
.itask { display:flex; align-items:center; gap:6px; padding:3px 4px; border-radius:4px; font-size:11px; transition:opacity 2.8s ease-out,background .4s ease-out; }
.itask.fading { background:rgba(0,200,117,.1); opacity:.1; }
.itask.tdone { opacity:.35; }
.itask span.done-t { color:var(--text-muted); text-decoration:line-through; }

/* Modal */
.overlay { position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,.35); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; padding:16px; }
.modal { background:var(--bg-card); border-radius:12px; padding:22px 24px 18px; width:100%; max-width:520px; max-height:85vh; overflow-y:auto; box-shadow:0 20px 50px rgba(0,0,0,.15); }
.modal h3 { font-size:16px; font-weight:700; }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.modal-close { background:none; border:none; font-size:22px; cursor:pointer; color:var(--text-muted); }
.modal label { font-size:11px; font-weight:600; color:var(--accent); display:block; margin-bottom:3px; }
.modal input,.modal select { width:100%; padding:8px 12px; border-radius:var(--radius); border:1.5px solid var(--border); font-size:13px; font-family:inherit; outline:none; color:var(--text); background:var(--bg-card); }
.modal input:focus { border-color:var(--accent); }
.status-btn { padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; }
.task-row { display:flex; gap:6px; align-items:center; padding:6px 8px; border-radius:6px; font-size:12px; transition:opacity 2.8s ease-out,background .4s ease-out; border-left:3px solid transparent; }
.task-row:hover { background:var(--bg); }
.task-row.fading { background:var(--green-bg); opacity:0; border-left-color:var(--green); }
.note-row { display:flex; gap:8px; align-items:flex-start; padding:6px 8px; background:var(--bg); border-radius:6px; font-size:12px; line-height:1.35; border-left:3px solid var(--accent-light); }
.rm-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:14px; padding:0 2px; line-height:1; opacity:0; transition:opacity .15s; }
.task-row:hover .rm-btn,.note-row:hover .rm-btn { opacity:1; }
.confirm-box { background:var(--bg-card); border-radius:12px; padding:28px; width:100%; max-width:360px; box-shadow:0 20px 50px rgba(0,0,0,.15); text-align:center; }
.confirm-box p { margin:0 0 20px; font-size:15px; font-weight:600; }

::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>

function renderEdit(){
  const p=s.projects.find(x=>x.id===s.editId);if(!p)return;
  const ts=p.tasks||[],dc=ts.filter(t=>t.done).length;
  const ov=h("div",{className:"overlay",onClick:()=>{s.editId=null;render();}});
  const m=h("div",{className:"modal",onClick:e=>e.stopPropagation()});
  m.append(h("div",{className:"modal-header"},h("h3",{},"Détails du projet"),h("button",{className:"modal-close",onClick:()=>{s.editId=null;render();}},"✕")));

  m.append(h("div",{style:{marginBottom:"12px"}},h("label",{},"Nom"),h("input",{value:p.name,onInput:e=>upd(p.id,{name:e.target.value})})));

  const stRow=h("div",{style:{display:"flex",gap:"4px"}});

  m.append(h("div",{style:{marginBottom:"12px"}},h("label",{},"Statut"),stRow));

  // Tasks

  if(ts.length>1)tBs.append(h("button",{className:"btn-tiny",onClick:()=>cfm("Supprimer toutes les tâches ?",()=>upd(p.id,{tasks:[]}))},"🗑 Tout"));
  tH.append(tBs);
  const tIR=h("div",{style:{display:"flex",gap:"6px",marginBottom:"6px"}});
  const tIn=h("input",{id:"task-input",value:s.newTask,placeholder:"Ajouter une tâche…",onInput:e=>{s.newTask=e.target.value;},onKeydown:e=>{if(e.key==="Enter")addTask();}});
  tIR.append(tIn,h("button",{className:"btn btn-accent",style:{padding:"8px 14px"},onClick:addTask},"+"));
  const tL=h("div",{style:{display:"flex",flexDirection:"column",gap:"2px",maxHeight:"180px",overflowY:"auto"}});
  ts.forEach((t,i)=>{
    const k=`${p.id}-${i}`,fg=s.fadT.has(k),ck=t.done||fg;
    const tr=h("div",{className:"task-row"+(fg?" fading":""),style:{background:!fg&&t.done?"var(--green-bg)":"transparent"}});
    tr.append(h("div",{className:"cb-sm"+(ck?" checked":""),onClick:()=>togTask(p.id,i)},ck?"✓":""),
      h("span",{style:{flex:"1",color:ck?"var(--text-muted)":"var(--text)",textDecoration:ck?"line-through":"none"}},t.text),
      h("span",{className:"mono",style:{fontSize:"9px",color:"var(--text-muted)",whiteSpace:"nowrap"}},t.date),

  nIR.append(nIn,h("button",{className:"btn btn-accent",style:{padding:"8px 14px"},onClick:addNote},"+"));
  const nL=h("div",{style:{display:"flex",flexDirection:"column",gap:"2px",maxHeight:"160px",overflowY:"auto"}});
  (p.notes||[]).forEach((n,i)=>{nL.append(h("div",{className:"note-row"},h("span",{className:"mono",style:{fontSize:"9px",color:"var(--text-muted)",whiteSpace:"nowrap",paddingTop:"1px"}},n.date),h("span",{style:{flex:"1"}},n.text),h("button",{className:"rm-btn",onClick:()=>{const x=[...(p.notes||[])];x.splice(i,1);upd(p.id,{notes:x});}},"×")));});

function renderExport(){
  let md=`# Projets — ${new Date().toLocaleDateString("fr-BE",{day:"numeric",month:"long",year:"numeric"})}\n\n`;
  const g={"In Progress":[],"To Do":[],"Done":[]};s.projects.forEach(p=>{if(g[p.status])g[p.status].push(p);});
  for(const[x,items]of Object.entries(g)){if(!items.length)continue;md+=`## ${ST[x].icon} ${x} (${items.length})\n\n`;items.forEach(p=>{md+=`### ${p.name}\n`;if(p.tasks?.length){md+="- **Tâches** :\n";p.tasks.forEach(t=>{md+=`  - [${t.done?"x":" "}] ${t.text}\n`;});}if(p.notes?.length){md+="- **Notes** :\n";p.notes.forEach(n=>{md+=`  - \`${n.date}\` ${n.text}\n`;});}md+="\n";});}
  const ov=h("div",{className:"overlay",onClick:()=>{s.showExport=false;render();}});
  const m=h("div",{className:"modal",onClick:e=>e.stopPropagation()});
  m.append(h("div",{className:"modal-header"},h("h3",{},"Export Markdown"),h("button",{className:"modal-close",onClick:()=>{s.showExport=false;render();}},"✕")));
  const w=h("div",{style:{position:"relative"}});
  w.append(h("pre",{className:"mono",style:{background:"var(--bg-dark)",color:"#F6F7FB",padding:"16px",borderRadius:"10px",fontSize:"12px",lineHeight:"1.5",maxHeight:"400px",overflowY:"auto",whiteSpace:"pre-wrap",wordBreak:"break-word"}},md));
  w.append(h("button",{className:"btn btn-ghost btn-sm",style:{position:"absolute",top:"8px",right:"8px"},onClick:()=>navigator.clipboard.writeText(md)},"📋 Copier"));
  m.append(w);ov.append(m);document.getElementById("app").append(ov);
}
