<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%2300C875' /><path d='M30 52 L44 66 L70 38' stroke='white' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#F6F7FB;--card:#FFF;--dark:#181B34;
  --accent:#6161FF;--green:#00C875;--amber:#FDAB3D;--red:#E2445C;--blue:#0086C0;
  --text:#323338;--sec:#676879;--muted:#C3C6D4;
  --border:#E6E9EF;--hover:#F5F6F8;
}
body{font-family:'Figtree',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom,0);-webkit-tap-highlight-color:transparent;}
::selection{background:var(--accent);color:#fff;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px;}

.wrap{max-width:680px;margin:0 auto;padding:24px 20px calc(40px + env(safe-area-inset-bottom,0));padding-left:max(20px,env(safe-area-inset-left,0));padding-right:max(20px,env(safe-area-inset-right,0));}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.topbar h1{font-size:28px;font-weight:700;color:var(--dark);letter-spacing:-.04em;}
.topbar .sync{font-size:10px;font-weight:600;margin-left:8px;}
.icon-btn{width:32px;height:32px;border-radius:8px;border:none;background:transparent;color:var(--sec);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.icon-btn:hover{background:var(--hover);}

.quick{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:24px;transition:border-color .2s,box-shadow .2s;box-shadow:0 1px 3px rgba(0,0,0,.03);}
.quick:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(97,97,255,.1);}
.quick input{width:100%;border:none;outline:none;font-size:15px;font-family:inherit;color:var(--text);background:transparent;}
.quick input::placeholder{color:var(--muted);}

.sec-hdr{display:flex;align-items:center;gap:8px;padding:6px 0;margin-bottom:4px;margin-top:20px;}
.sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sec-label{font-size:12px;font-weight:600;color:var(--sec);text-transform:uppercase;letter-spacing:.04em;}
.sec-count{font-size:11px;color:var(--muted);font-weight:500;}
.sec-toggle{background:none;border:none;cursor:pointer;color:var(--sec);font-size:13px;transition:transform .2s;padding:2px 4px;}
.sec-toggle.open{transform:rotate(90deg);}
.sec-line{flex:1;height:1px;background:var(--border);}

.cards{display:flex;flex-direction:column;gap:1px;}
.row{display:flex;align-items:flex-start;transition:transform .15s,opacity .15s;}
.row.dragging{opacity:.3;transform:scale(.98);}
.row.drag-over-above{border-top:2px solid var(--accent);margin-top:-2px;}
.row.drag-over-below{border-bottom:2px solid var(--accent);margin-bottom:-2px;}
.grip{width:24px;padding-top:13px;display:flex;justify-content:center;flex-shrink:0;cursor:grab;color:var(--muted);font-size:14px;opacity:.35;transition:opacity .15s;user-select:none;-webkit-user-select:none;letter-spacing:1px;}
.grip:active{cursor:grabbing;}
.row:hover .grip{opacity:.7;}
.chk{width:44px;min-height:44px;padding-top:11px;display:flex;justify-content:center;flex-shrink:0;cursor:pointer;}

.bx{width:20px;height:20px;border-radius:4px;border:2px solid var(--muted);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .15s;cursor:pointer;color:transparent;user-select:none;}
.bx.ip{border-color:var(--amber);color:var(--amber);background:var(--card);}
.bx.dn{border-color:var(--green);background:var(--green);color:#fff;}
.bx-s{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--muted);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;transition:all .15s;cursor:pointer;color:transparent;flex-shrink:0;user-select:none;}
.bx-s.ip{border-color:var(--amber);color:var(--amber);background:var(--card);}
.bx-s.dn{border-color:var(--green);background:var(--green);color:#fff;}

.crd{flex:1;padding:10px 14px;border-radius:8px;cursor:pointer;transition:background .12s;}
.crd:hover{background:var(--hover);}
.crd-top{display:flex;align-items:center;gap:10px;}
.crd-name{font-size:15px;font-weight:500;line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
.crd-name.x{text-decoration:line-through;color:var(--muted);}
.meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);flex-shrink:0;}
.prog{width:36px;height:3px;border-radius:2px;background:var(--border);overflow:hidden;}
.prog-f{height:100%;border-radius:2px;transition:width .3s;}

.itasks{margin-top:5px;display:flex;flex-direction:column;}
.it{display:flex;align-items:center;gap:7px;padding:6px 0;font-size:13px;color:var(--sec);min-height:36px;}
.it span.x{color:var(--muted);text-decoration:line-through;}

.ov{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.22);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;padding:0;}
.mod{background:var(--card);border-radius:16px 16px 0 0;padding:24px;padding-bottom:calc(24px + env(safe-area-inset-bottom,0));width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 48px rgba(0,0,0,.12);}
.mod h3{font-size:17px;font-weight:700;color:var(--dark);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.mod-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.mod-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;}
.mod label{font-size:11px;font-weight:600;color:var(--sec);display:block;margin-bottom:4px;}
.mod input{width:100%;padding:11px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:16px;font-family:inherit;outline:none;color:var(--text);transition:border-color .15s;}
.mod input:focus{border-color:var(--accent);}
.sb{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:1.5px solid var(--border);background:var(--card);color:var(--sec);transition:all .15s;}
.sb.on{color:#fff;}
.tr{display:flex;gap:6px;align-items:center;padding:10px 8px;border-radius:6px;font-size:13px;border-left:3px solid transparent;min-height:44px;}
.tr:hover{background:var(--hover);}
.tr.done-bg{background:rgba(0,200,117,.04);border-left-color:var(--green);}
.tr.prog-bg{border-left-color:var(--amber);}
.nr{display:flex;gap:8px;align-items:flex-start;padding:10px 8px;border-radius:6px;font-size:13px;line-height:1.35;border-left:3px solid var(--border);min-height:44px;}
.nr:hover{background:var(--hover);}
.rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px 6px;line-height:1;opacity:1;transition:opacity .15s;}
.cfm{background:var(--card);border-radius:12px;padding:28px;width:100%;max-width:340px;box-shadow:0 16px 48px rgba(0,0,0,.12);text-align:center;}
.cfm p{margin:0 0 20px;font-size:15px;font-weight:600;}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:14px;font-family:inherit;transition:all .15s;min-height:44px;}
.btn:hover{opacity:.88;}
.btn-a{background:var(--accent);color:#fff;}
.btn-r{background:var(--red);color:#fff;}
.btn-g{background:transparent;color:var(--sec);border:1px solid var(--border);}
.btn-t{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;padding:8px;min-height:44px;}
.btn-t:hover{color:var(--sec);}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Desktop overrides */
@media(min-width:600px){
  .ov{align-items:center;padding:16px;}
  .mod{border-radius:12px;padding:24px;padding-bottom:24px;max-height:85vh;box-shadow:0 16px 48px rgba(0,0,0,.12);}
  .rm{opacity:0;}
  .tr:hover .rm,.nr:hover .rm{opacity:1;}
}
/* Mobile tweaks */
@media(max-width:599px){
  .crd-name{white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  .topbar h1{font-size:26px;}
  .quick input{font-size:16px;}
  .sec-toggle{padding:8px 10px;font-size:16px;}
  .icon-btn{width:44px;height:44px;font-size:18px;}
  .grip{opacity:.5;min-height:44px;width:28px;font-size:16px;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const BIN_ID="69b32b9ab7ec241ddc634928",AK="$2a$10$c6o3RYJkkxNpy7r.NY3DW.bz4LyKK5Pwz.3ALRn2LB7B9TB85jKiO";
const BU="https://api.jsonbin.io/v3/b/"+BIN_ID,HD={"Content-Type":"application/json","X-Master-Key":AK};
const DF=[
  {id:"p1",name:"Template Jira — Quiz Ciblage v2",status:"In Progress",tasks:[{text:"Ajouter les questions MC labels",st:"todo"},{text:"Questions recurring journeys",st:"todo"},{text:"Valider 5 nouvelles questions v2",st:"done"}],notes:[{date:"2025-12",text:"5 questions validées (v2)"},{date:"2025-11",text:"Structure 2 parties"}]},
  {id:"p2",name:"E-Certificat Auto — Merge mensuel",status:"In Progress",tasks:[{text:"Prochaine vague merge NRB",st:"todo"}],notes:[{date:"2025-12",text:"Script merge Python opérationnel"}]},
  {id:"p3",name:"Ambassadeur Data 2026",status:"To Do",tasks:[{text:"Planifier news #1",st:"todo"},{text:"Premier atelier",st:"todo"},{text:"Formation data catalogue",st:"todo"},{text:"Formation ODE consumer",st:"todo"}],notes:[{date:"2026-01",text:"7 sous-objectifs"}]},
  {id:"p4",name:"Loyalty Auto Case 1",status:"In Progress",tasks:[],notes:[{date:"2026-01",text:"Automation 11 activities / 10 steps"}]},
  {id:"p5",name:"Exploitation Devis — Scripts hebdo",status:"Done",tasks:[{text:"Traitement 1",st:"done"},{text:"Traitement 2",st:"done"}],notes:[{date:"2025-12",text:"Opérationnels"}]},
  {id:"p6",name:"IBAN Récupération clients",status:"To Do",tasks:[{text:"Coordonner avec V. Pécasse et L. Kluge",st:"todo"}],notes:[{date:"2026-01",text:"~20% clients sans IBAN"}]},
];

// ─── State ───
let s={p:[],ok:false,sy:"loading",ed:null,exp:false,keys:false,cm:null,cf:null,nk:"",an:"",sel:new Set(),doneOpen:false,sh:false,noteEdit:false};
let svT=null;
const syncLogs=[];
function slog(type,msg){
  const now=new Date();
  const ts=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0")+":"+String(now.getSeconds()).padStart(2,"0");
  syncLogs.push({ts,type,msg});
  if(syncLogs.length>30)syncLogs.shift();
}

// ─── Drag & Drop (To Do only) ───
let dragId=null;
function reorder(fromId,toId){
  if(!fromId||!toId||fromId===toId)return;
  const arr=[...s.p];
  const fi=arr.findIndex(p=>p.id===fromId);
  const ti=arr.findIndex(p=>p.id===toId);
  if(fi<0||ti<0)return;
  // Swap: remove from old position, insert at target position
  const [item]=arr.splice(fi,1);
  arr.splice(ti,0,item);
  ps(arr);
}

let touchDragEl=null,touchClone=null,touchCurId=null;
const gid=()=>"p"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const td=()=>new Date().toISOString().slice(0,10);
function shortDt(d){if(!d)return"";const dt=new Date(d);const m=["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];return dt.getDate()+" "+m[dt.getMonth()];}
// Render text with clickable links and line breaks
function richText(txt,style){
  const sp=h("span",{style:style||{}});
  const urlRe=/(https?:\/\/[^\s]+)/g;
  const lines=txt.split("\n");
  lines.forEach((line,li)=>{
    let last=0;
    line.replace(urlRe,(m,offset)=>{
      if(offset>last)sp.append(document.createTextNode(line.slice(last,offset)));
      const a=h("a",{href:m,style:{color:"var(--accent)",textDecoration:"underline",wordBreak:"break-all"}});
      a.textContent=m.length>50?m.slice(0,47)+"…":m;
      a.target="_blank";a.rel="noopener";
      a.addEventListener("click",e=>e.stopPropagation());
      sp.append(a);last=offset+m.length;
    });
    if(last<line.length)sp.append(document.createTextNode(line.slice(last)));
    if(li<lines.length-1)sp.append(document.createElement("br"));
  });
  return sp;
}function tSt(t){return t.st||(t.done?"done":"todo");}
// Backward compat: convert old notes array to single string
function getNote(p){
  if(typeof p.note==="string")return p.note;
  if(Array.isArray(p.notes)&&p.notes.length)return p.notes.map(n=>n.text).join("\n");
  return "";
}

// ─── Sync ───
async function lb(){const r=await fetch(BU+"/latest",{headers:HD});if(!r.ok)throw 0;return(await r.json()).record?.projects||[];}
async function sb(p){const r=await fetch(BU,{method:"PUT",headers:HD,body:JSON.stringify({projects:p})});if(!r.ok)throw 0;}
function ps(p){s.p=p;s.sy="saving";slog("↑","Sauvegarde…");R();if(svT)clearTimeout(svT);svT=setTimeout(async()=>{try{await sb(p);s.sy="synced";slog("☁","Sauvegardé ("+p.length+" projets)");}catch{s.sy="error";slog("✕","Erreur sauvegarde");}R();},800);}

// up: update project — skipRender flag to avoid double render
function up(id,patch,skipRender){
  s.p=s.p.map(p=>p.id===id?{...p,...patch}:p);
  s.sy="saving";
  if(svT)clearTimeout(svT);
  svT=setTimeout(async()=>{try{await sb(s.p);s.sy="synced";slog("☁","Synced");}catch{s.sy="error";slog("✕","Erreur sync");}R();},800);
  if(!skipRender) R();
}

(async()=>{try{slog("↓","Chargement…");const d=await lb();s.p=d.length?d:DF;if(!d.length)await sb(DF);s.sy="synced";slog("☁","Chargé ("+s.p.length+" projets)");}catch{s.p=DF;s.sy="error";slog("✕","Erreur chargement");}s.ok=true;R();document.addEventListener("keydown",onK);})();

// ─── Cycle: To Do → In Progress → Done → To Do ───
const NEXT={"To Do":"In Progress","In Progress":"Done","Done":"To Do"};
const TNEXT={"todo":"progress","progress":"done","done":"todo"};

function togP(id){
  const p=s.p.find(x=>x.id===id);if(!p)return;
  const next=NEXT[p.status]||"To Do";
  const patch={status:next};
  const now=td();
  if(next==="Done"){patch.doneAt=now;patch.tasks=(p.tasks||[]).map(t=>({...t,st:"done",doneAt:t.doneAt||now}));}
  if(next==="To Do"){delete patch.doneAt;patch.tasks=(p.tasks||[]).map(t=>{const o={...t,st:"todo"};delete o.doneAt;return o;});}
  up(id,patch);
}

function togT(pid,i){
  const p=s.p.find(x=>x.id===pid);if(!p)return;
  const t=(p.tasks||[])[i];if(!t)return;
  const ts=[...(p.tasks||[])];
  const nst=TNEXT[tSt(t)]||"todo";
  const nt={...t,st:nst};
  if(nst==="done") nt.doneAt=td();
  else delete nt.doneAt;
  ts[i]=nt;
  const patch={tasks:ts};
  // Auto-promote: first task starts → project In Progress
  if(tSt(t)==="todo"&&p.status==="To Do") patch.status="In Progress";
  // Auto-demote: any task leaves done → project back to In Progress
  if(tSt(t)==="done"&&nst!=="done"&&p.status==="Done"){patch.status="In Progress";patch.doneAt=null;}
  up(pid,patch,true);
  // Auto-complete: all tasks done → project Done
  const cur=s.p.find(x=>x.id===pid);
  if(cur&&cur.tasks&&cur.tasks.length&&cur.tasks.every(t2=>tSt(t2)==="done")&&cur.status!=="Done"){
    up(pid,{status:"Done",doneAt:td()});
  } else {
    R();
  }
}

function qadd(){
  if(!s.an.trim())return;
  const n={id:gid(),name:s.an.trim(),status:"To Do",tasks:[],note:""};
  ps([n,...s.p]);
  s.an="";s.ed=n.id;s.nk="";
}
function atk(){if(!s.nk.trim()||!s.ed)return;const p=s.p.find(x=>x.id===s.ed);up(s.ed,{tasks:[...(p.tasks||[]),{text:s.nk.trim(),st:"todo",date:td()}]});s.nk="";}
function cfm(m,f){s.cm=m;s.cf=f;R();}
function xcfm(){s.cm=null;s.cf=null;R();}

function onK(e){
  const ii=["INPUT","TEXTAREA","SELECT"].includes(document.activeElement?.tagName);
  if(e.key==="Escape"){if(s.cm)xcfm();else if(s.ed){s.ed=null;}else if(s.exp){s.exp=false;}else if(s.keys){s.keys=false;}else if(s.sel.size)s.sel.clear();e.preventDefault();R();return;}
  if(e.key==="Enter"){if(s.cm){e.preventDefault();s.cf?.();xcfm();return;}if(s.keys||s.exp){e.preventDefault();s.keys=false;s.exp=false;R();return;}if(s.ed&&!ii){e.preventDefault();s.ed=null;R();return;}}
  if(!ii&&!s.ed&&!s.exp&&!s.keys){
    if(e.key==="n"){e.preventDefault();document.getElementById("qi")?.focus();return;}
    if(e.key==="e"){e.preventDefault();s.exp=true;R();}
    if(e.key==="?"){e.preventDefault();s.keys=!s.keys;R();}
  }
  if(s.ed&&!ii){
    if(e.key==="t"){e.preventDefault();document.getElementById("ti")?.focus();}
    if(e.key==="n"){e.preventDefault();document.getElementById("ni")?.focus();}
    if(e.key==="1")up(s.ed,{status:"To Do",doneAt:null});if(e.key==="2")up(s.ed,{status:"In Progress",doneAt:null});if(e.key==="3")up(s.ed,{status:"Done",doneAt:td()});
  }
}

// ─── Rendering helpers ───
function h(t,p,...k){const e=document.createElement(t);if(p)Object.entries(p).forEach(([a,v])=>{if(a==="style"&&typeof v==="object")Object.assign(e.style,v);else if(a.startsWith("on"))e.addEventListener(a.slice(2).toLowerCase(),v);else if(a==="className")e.className=v;else e.setAttribute(a,v);});k.flat(9).forEach(c=>{if(c!=null)e.append(typeof c==="string"?document.createTextNode(c):c);});return e;}

function bxCls(st){return st==="done"?"bx dn":st==="progress"?"bx ip":"bx";}
function bxTxt(st){return st==="done"?"✓":st==="progress"?"–":"";}
function bxsCls(st){return st==="done"?"bx-s dn":st==="progress"?"bx-s ip":"bx-s";}

function mkRow(p){
  const ts=p.tasks||[];
  const dc=ts.filter(t=>tSt(t)==="done").length;
  const pSt=p.status==="Done"?"done":p.status==="In Progress"?"progress":"todo";
  const isDone=p.status==="Done";
  const isTodo=p.status==="To Do";
  const row=h("div",{className:"row"});
  row.setAttribute("data-id",p.id);

  // Drag & Drop — To Do only
  const clearDO=()=>document.querySelectorAll(".row.drag-over-above,.row.drag-over-below").forEach(r=>{r.classList.remove("drag-over-above","drag-over-below");});
  if(isTodo){
    row.addEventListener("dragover",e=>{e.preventDefault();clearDO();
      const fi=s.p.findIndex(x=>x.id===dragId),ti=s.p.findIndex(x=>x.id===p.id);
      row.classList.add(fi<ti?"drag-over-below":"drag-over-above");
    });
    row.addEventListener("dragleave",()=>{row.classList.remove("drag-over-above","drag-over-below");});
    row.addEventListener("drop",e=>{e.preventDefault();clearDO();reorder(dragId,p.id);dragId=null;});

    const grip=h("div",{className:"grip"});
    grip.textContent="⠿";
    grip.draggable=true;
    grip.addEventListener("dragstart",e=>{dragId=p.id;e.dataTransfer.effectAllowed="move";e.dataTransfer.setDragImage(row,0,0);row.classList.add("dragging");});
    grip.addEventListener("dragend",()=>{dragId=null;row.classList.remove("dragging");clearDO();});
    // Touch
    grip.addEventListener("touchstart",e=>{
      touchCurId=p.id;
      touchClone=row.cloneNode(true);touchClone.style.cssText="position:fixed;left:0;right:0;z-index:9999;opacity:.8;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.15);background:#fff;";
      touchClone.style.top=row.getBoundingClientRect().top+"px";
      document.body.append(touchClone);
      row.style.opacity=".3";touchDragEl=row;
    },{passive:true});
    grip.addEventListener("touchmove",e=>{
      if(!touchClone)return;e.preventDefault();
      const y=e.touches[0].clientY;
      touchClone.style.top=(y-20)+"px";
      clearDO();
      const el=document.elementFromPoint(window.innerWidth/2,y);
      const target=el?.closest?.(".row");
      const tid=target?.getAttribute("data-id");
      if(target&&tid!==touchCurId){
        const fi=s.p.findIndex(x=>x.id===touchCurId),ti=s.p.findIndex(x=>x.id===tid);
        target.classList.add(fi<ti?"drag-over-below":"drag-over-above");
      }
    });
    grip.addEventListener("touchend",()=>{
      if(touchClone){touchClone.remove();touchClone=null;}
      if(touchDragEl){touchDragEl.style.opacity="";touchDragEl=null;}
      const overEl=document.querySelector(".row.drag-over-above,.row.drag-over-below");
      const toId=overEl?.getAttribute("data-id");
      clearDO();
      if(touchCurId&&toId)reorder(touchCurId,toId);
      touchCurId=null;
    });
    row.append(grip);
  }

  row.append(h("div",{className:"chk",onClick:e=>{e.stopPropagation();togP(p.id);}},
    h("div",{className:bxCls(pSt)},bxTxt(pSt))));

  const c=h("div",{className:"crd",onClick:()=>{s.ed=p.id;s.nk="";s.noteEdit=false;R();}});
  c.oncontextmenu=e=>{e.preventDefault();s.sel.has(p.id)?s.sel.delete(p.id):s.sel.add(p.id);R();};

  const top=h("div",{className:"crd-top"});
  top.append(h("span",{className:"crd-name"+(isDone?" x":"")},p.name));
  const meta=h("div",{className:"meta"});
  if(ts.length){
    const pg=h("div",{className:"prog"});
    pg.append(h("div",{className:"prog-f",style:{width:(dc/ts.length*100)+"%",background:dc===ts.length?"var(--green)":"var(--amber)"}}));
    meta.append(pg,h("span",{},dc+"/"+ts.length));
  }
  if(getNote(p)){
    const noteIcon=h("span",{style:{display:"inline-flex",alignItems:"center",gap:"3px"}});
    const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
    svg.setAttribute("width","16");svg.setAttribute("height","16");svg.setAttribute("viewBox","0 0 16 16");svg.setAttribute("fill","none");svg.style.color="var(--sec)";
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d","M2 2h12v8H5l-3 3V2z");path.setAttribute("stroke","currentColor");path.setAttribute("stroke-width","1.8");path.setAttribute("stroke-linejoin","round");
    svg.append(path);noteIcon.append(svg);
    meta.append(noteIcon);
  }
  if(isDone&&p.doneAt)meta.append(h("span",{style:{color:"var(--green)",fontSize:"10px",fontFamily:"monospace"}},"✓ "+shortDt(p.doneAt)));
  top.append(meta);c.append(top);

  if(ts.length){
    const itd=h("div",{className:"itasks"});
    ts.forEach((t,i)=>{
      const st=tSt(t);
      const it=h("div",{className:"it"});
      it.append(
        h("div",{className:bxsCls(st),onClick:e=>{e.stopPropagation();togT(p.id,i);}},bxTxt(st)),
        h("span",{className:st==="done"?"x":"",style:{flex:"1"}},t.text)
      );
      if(st==="done"&&t.doneAt)it.append(h("span",{style:{fontSize:"10px",color:"var(--muted)",fontFamily:"monospace",whiteSpace:"nowrap",paddingLeft:"6px"}},shortDt(t.doneAt)));
      itd.append(it);
    });
    c.append(itd);
  }
  // Hide button on done projects
  if(isDone){
    const hBtn=h("span",{style:{fontSize:"14px",color:"var(--muted)",cursor:"pointer",padding:"8px",lineHeight:"1",flexShrink:"0",alignSelf:"center"},onClick:e=>{e.stopPropagation();up(p.id,{hidden:true});}},"×");
    row.append(c,hBtn);
  } else {
    row.append(c);
  }
  return row;
}

function mkSec(label,color,count,toggle,isOpen,onToggle){
  const hdr=h("div",{className:"sec-hdr"});
  hdr.append(h("div",{className:"sec-dot",style:{background:color}}));
  hdr.append(h("span",{className:"sec-label"},label));
  hdr.append(h("span",{className:"sec-count"},count+""));
  hdr.append(h("div",{className:"sec-line"}));
  if(toggle)hdr.append(h("button",{className:"sec-toggle"+(isOpen?" open":""),onClick:onToggle},"▶"));
  return hdr;
}

// ─── Main render ───
function R(){
  // Skip re-render of modal if editing name (preserve focus)
  const activeEl=document.activeElement;
  const activeId=activeEl?.id;
  const cursorPos=activeEl?.selectionStart;

  const a=document.getElementById("app");a.innerHTML="";
  if(!s.ok){a.append(h("div",{className:"empty"},"Chargement…"));return;}
  const scM={synced:{c:"var(--green)",t:"✓"},saving:{c:"var(--amber)",t:"⟳"},error:{c:"var(--red)",t:"✕"},loading:{c:"var(--blue)",t:"…"}};
  const sc=scM[s.sy]||scM.synced;

  const ip=s.p.filter(p=>p.status==="In Progress"&&!p.hidden);
  const td2=s.p.filter(p=>p.status==="To Do"&&!p.hidden);
  const dn=s.p.filter(p=>p.status==="Done"&&!p.hidden).sort((a,b)=>(b.doneAt||"").localeCompare(a.doneAt||""));
  const hid=s.p.filter(p=>p.hidden);

  // Clean stale selection IDs
  const allIds=new Set(s.p.map(p=>p.id));
  s.sel.forEach(id=>{if(!allIds.has(id))s.sel.delete(id);});

  const w=h("div",{className:"wrap"});

  // Topbar
  const tb=h("div",{className:"topbar"});
  tb.append(h("h1",{},h("span",{},"Task"),h("span",{style:{color:"var(--amber)"}},".r")));
  const acts=h("div",{style:{display:"flex",gap:"6px",alignItems:"center"}});
  acts.append(
    h("button",{className:"icon-btn",title:"Raccourcis",onClick:()=>{s.keys=true;R();}},"⌨"),
    h("button",{className:"icon-btn",title:"Export",onClick:()=>{s.exp=true;R();}},"↗")
  );
  // Sync indicator with hover tooltip
  const syncWrap=h("div",{style:{position:"relative",marginLeft:"2px"}});
  const syncDot=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",width:"28px",height:"28px",color:sc.c,cursor:"pointer"}});
  // SVG sync icon
  const ssvg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  ssvg.setAttribute("width","14");ssvg.setAttribute("height","14");ssvg.setAttribute("viewBox","0 0 16 16");ssvg.setAttribute("fill","none");
  const sp1=document.createElementNS("http://www.w3.org/2000/svg","path");
  sp1.setAttribute("d","M2.5 8a5.5 5.5 0 0 1 9.3-4");sp1.setAttribute("stroke","currentColor");sp1.setAttribute("stroke-width","1.8");sp1.setAttribute("stroke-linecap","round");
  const sp2=document.createElementNS("http://www.w3.org/2000/svg","path");
  sp2.setAttribute("d","M13.5 8a5.5 5.5 0 0 1-9.3 4");sp2.setAttribute("stroke","currentColor");sp2.setAttribute("stroke-width","1.8");sp2.setAttribute("stroke-linecap","round");
  const sp3=document.createElementNS("http://www.w3.org/2000/svg","path");
  sp3.setAttribute("d","M11 2l1 2.5L9.5 5");sp3.setAttribute("stroke","currentColor");sp3.setAttribute("stroke-width","1.5");sp3.setAttribute("stroke-linecap","round");sp3.setAttribute("stroke-linejoin","round");
  const sp4=document.createElementNS("http://www.w3.org/2000/svg","path");
  sp4.setAttribute("d","M5 14l-1-2.5 2.5-.5");sp4.setAttribute("stroke","currentColor");sp4.setAttribute("stroke-width","1.5");sp4.setAttribute("stroke-linecap","round");sp4.setAttribute("stroke-linejoin","round");
  ssvg.append(sp1,sp2,sp3,sp4);
  if(sc.c==="var(--amber)")ssvg.style.animation="spin .8s linear infinite";
  syncDot.append(ssvg);
  // Tooltip
  const tip=h("div",{style:{position:"absolute",right:"0",top:"36px",background:"var(--card)",color:"var(--text)",borderRadius:"10px",padding:"10px 12px",fontSize:"10px",fontFamily:"monospace",lineHeight:"1.6",whiteSpace:"nowrap",boxShadow:"0 4px 16px rgba(0,0,0,.08)",border:"1px solid var(--border)",zIndex:"100",opacity:"0",pointerEvents:"none",transition:"opacity .15s",minWidth:"200px"}});
  if(syncLogs.length){
    [...syncLogs].slice(-6).reverse().forEach(l=>{
      const iconCol=l.type==="☁"||l.type==="↓"?"var(--green)":l.type==="↑"?"var(--amber)":"var(--red)";
      tip.append(h("div",{style:{display:"flex",gap:"6px"}},
        h("span",{style:{color:"var(--muted)"}},l.ts),
        h("span",{style:{color:iconCol}},l.type),
        h("span",{style:{color:"var(--sec)"}},l.msg)
      ));
    });
  } else {
    tip.append(h("div",{style:{color:"var(--muted)"}},"Aucun log"));
  }
  syncWrap.append(syncDot,tip);
  // Hover (desktop)
  syncWrap.addEventListener("mouseenter",()=>{tip.style.opacity="1";tip.style.pointerEvents="auto";});
  syncWrap.addEventListener("mouseleave",()=>{tip.style.opacity="0";tip.style.pointerEvents="none";});
  // Click → open jsonbin dashboard
  syncDot.addEventListener("click",e=>{e.stopPropagation();window.open("https://jsonbin.io/app/bins","_blank");});
  acts.append(syncWrap);
  tb.append(acts);w.append(tb);

  // Quick input
  const qi=h("div",{className:"quick"});
  qi.append(h("input",{id:"qi",placeholder:"Ajouter une tâche…",value:s.an,onInput:e=>{s.an=e.target.value;},onKeydown:e=>{if(e.key==="Enter")qadd();}}));
  w.append(qi);

  // Selection bar
  if(s.sel.size){
    const sb2=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px",padding:"8px 14px",background:"#FFF0F2",borderRadius:"8px",fontSize:"12px"}});
    sb2.append(
      h("span",{style:{flex:"1",color:"var(--sec)"}},s.sel.size+" sélect."),
      h("button",{className:"btn btn-r",style:{fontSize:"11px",padding:"4px 12px"},onClick:()=>cfm("Supprimer "+s.sel.size+" projet(s) ?",()=>{ps(s.p.filter(p=>!s.sel.has(p.id)));s.sel.clear();})},"Supprimer"),
      h("button",{className:"btn-t",onClick:()=>{s.sel.clear();R();}},"Annuler")
    );w.append(sb2);
  }

  // Sections
  if(ip.length){
    w.append(mkSec("In Progress","#FDAB3D",ip.length));
    const cards=h("div",{className:"cards"});ip.forEach(p=>cards.append(mkRow(p)));w.append(cards);
  }
  if(td2.length){
    w.append(mkSec("To Do","#0086C0",td2.length));
    const cards=h("div",{className:"cards"});td2.forEach(p=>cards.append(mkRow(p)));w.append(cards);
  }
  if(dn.length){
    w.append(mkSec("Terminé","#00C875",dn.length,true,s.doneOpen,()=>{s.doneOpen=!s.doneOpen;R();}));
    if(s.doneOpen){const cards=h("div",{className:"cards"});dn.forEach(p=>cards.append(mkRow(p)));w.append(cards);}
  }
  if(hid.length){
    const hidSec=h("div",{style:{marginTop:"24px",paddingTop:"12px",borderTop:"1px solid var(--border)"}});
    hidSec.append(h("button",{className:"btn-t",style:{fontSize:"11px",display:"flex",alignItems:"center",gap:"4px"},onClick:()=>{s.sh=!s.sh;R();}},
      h("span",{style:{transition:"transform .2s",display:"inline-block",transform:s.sh?"rotate(90deg)":"rotate(0)"}},"▶"),
      "Archivées ("+hid.length+")"
    ));
    if(s.sh){
      const cards=h("div",{className:"cards",style:{marginTop:"6px"}});
      hid.forEach(p=>{
        const row=h("div",{style:{display:"flex",alignItems:"center",padding:"8px",gap:"8px",opacity:".6"}});
        row.append(
          h("span",{style:{flex:"1",fontSize:"13px",color:"var(--muted)",textDecoration:"line-through"}},p.name),
          h("span",{style:{fontSize:"10px",color:"var(--muted)",fontFamily:"monospace"}},p.doneAt?shortDt(p.doneAt):""),
          h("button",{className:"btn-t",style:{fontSize:"12px",padding:"4px 8px"},title:"Restaurer",onClick:()=>up(p.id,{hidden:false})},"↩"),
          h("button",{className:"btn-t",style:{fontSize:"12px",padding:"4px 8px",color:"var(--red)"},title:"Supprimer",onClick:()=>cfm("Supprimer définitivement ?",()=>ps(s.p.filter(x=>x.id!==p.id)))},"🗑")
        );
        cards.append(row);
      });
      hidSec.append(cards);
    }
    w.append(hidSec);
  }
  if(!ip.length&&!td2.length&&!dn.length&&!hid.length) w.append(h("div",{className:"empty"},"Aucun projet."));

  // Version footer
  const vf=h("div",{style:{textAlign:"center",padding:"24px 0 12px",fontSize:"10px",color:"var(--muted)",fontFamily:"monospace",opacity:".5",letterSpacing:".02em"}});
  vf.textContent="v1.0 · 13 mar 2026 19:42";
  w.append(vf);

  a.append(w);
  if(s.ed)rEdit();
  if(s.exp)rExp();
  if(s.keys)rKeys();
  if(s.cm)rCfm();

  // Restore focus after render
  if(activeId){
    const el=document.getElementById(activeId);
    if(el){
      el.focus();
      if(typeof cursorPos==="number"&&el.setSelectionRange){
        try{el.setSelectionRange(cursorPos,cursorPos);}catch(e){}
      }
    }
  }
}

// ─── Edit modal ───
function rEdit(){
  const p=s.p.find(x=>x.id===s.ed);if(!p)return;
  const ts=p.tasks||[],dc=ts.filter(t=>tSt(t)==="done").length;
  const ov=h("div",{className:"ov"});
  let ovTouchedOv=false;
  ov.addEventListener("touchstart",e=>{ovTouchedOv=(e.target===ov);},{passive:true});
  ov.addEventListener("touchend",e=>{if(!ovTouchedOv)return;e.preventDefault();if(s.cm)return;s.ed=null;s.noteEdit=false;R();});
  ov.addEventListener("click",e=>{if(e.target!==ov)return;if(s.cm)return;s.ed=null;s.noteEdit=false;R();});
  const m=h("div",{className:"mod",onClick:e=>e.stopPropagation()});
  m.append(h("div",{className:"mod-hdr"},h("h3",{},p.name),h("button",{className:"mod-x",onClick:e=>{e.stopPropagation();if(s.cm)return;s.ed=null;R();}},"✕")));

  // Status buttons
  const sr=h("div",{style:{display:"flex",gap:"5px",marginBottom:"16px"}});
  [["To Do","#0086C0","#E0F4FF"],["In Progress","#FDAB3D","#FFF4E0"],["Done","#00C875","#E0FFF0"]].forEach(([x,c,bg])=>{
    sr.append(h("button",{className:"sb"+(p.status===x?" on":""),style:p.status===x?{borderColor:c,background:c,color:"#fff"}:{},onClick:()=>{const patch={status:x};if(x==="Done")patch.doneAt=td();else patch.doneAt=null;up(p.id,patch);}},x));
  });
  m.append(sr);

  // Name — use id for focus restore
  m.append(h("div",{style:{marginBottom:"14px"}},h("label",{},"Nom"),h("input",{id:"ed-name",value:p.name,onInput:e=>up(p.id,{name:e.target.value})})));

  // Tasks
  const th2=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}});
  th2.append(h("label",{style:{margin:"0"}},"Tâches"+(ts.length?" ("+dc+"/"+ts.length+")":"")));
  const tbs=h("div",{style:{display:"flex",gap:"6px"}});
  if(dc)tbs.append(h("button",{className:"btn-t",onClick:()=>up(p.id,{tasks:ts.filter(t=>tSt(t)!=="done")})},"✓ Suppr. terminées"));
  if(ts.length>1)tbs.append(h("button",{className:"btn-t",onClick:()=>cfm("Vider les tâches ?",()=>up(p.id,{tasks:[]}))},"🗑"));
  th2.append(tbs);

  const tir=h("div",{style:{display:"flex",gap:"6px",marginBottom:"8px"}});
  tir.append(h("input",{id:"ti",value:s.nk,placeholder:"Nouvelle tâche…",onInput:e=>{s.nk=e.target.value;},onKeydown:e=>{if(e.key==="Enter")atk();}}),h("button",{className:"btn btn-a",style:{padding:"8px 14px"},onClick:atk},"+"));

  const tl=h("div",{style:{display:"flex",flexDirection:"column",gap:"1px",maxHeight:"200px",overflowY:"auto"}});
  ts.forEach((t,i)=>{
    const st=tSt(t);
    const trCls="tr"+(st==="done"?" done-bg":st==="progress"?" prog-bg":"");
    const tr=h("div",{className:trCls});
    tr.append(
      h("div",{className:bxsCls(st),onClick:()=>togT(p.id,i)},bxTxt(st)),
      h("span",{style:{flex:"1",color:st==="done"?"var(--muted)":"var(--text)",textDecoration:st==="done"?"line-through":"none",fontSize:"13px"}},t.text),
      h("span",{style:{fontSize:"10px",color:st==="done"?"var(--green)":"var(--muted)",fontFamily:"monospace",whiteSpace:"nowrap"}},st==="done"&&t.doneAt?"✓ "+shortDt(t.doneAt):t.date||""),
      h("button",{className:"rm",onClick:()=>{const x=[...ts];x.splice(i,1);up(p.id,{tasks:x});}},"×")
    );
    tl.append(tr);
  });
  if(!ts.length)tl.append(h("div",{style:{padding:"10px",color:"var(--muted)",fontSize:"13px",textAlign:"center"}},"Aucune tâche"));
  m.append(h("div",{style:{marginBottom:"14px"}},th2,tir,tl));

  // Notes — preview with clickable links, click to edit
  const noteVal=getNote(p);
  const nd=h("div",{style:{marginBottom:"14px"}});
  nd.append(h("label",{},"Notes"));

  // Preview (richText with links)
  if(noteVal&&!s.noteEdit){
    const preview=h("div",{style:{padding:"11px 12px",borderRadius:"8px",border:"1.5px solid var(--border)",fontSize:"14px",lineHeight:"1.5",minHeight:"44px",cursor:"text",background:"var(--card)",wordBreak:"break-word"}});
    preview.append(richText(noteVal,{}));
    preview.addEventListener("click",e=>{if(e.target.tagName==="A")return;s.noteEdit=true;R();});
    nd.append(preview);
  } else if(!noteVal&&!s.noteEdit){
    const ph=h("div",{style:{padding:"11px 12px",borderRadius:"8px",border:"1.5px dashed var(--border)",fontSize:"13px",color:"var(--muted)",cursor:"text",minHeight:"44px"}});
    ph.textContent="Cliquer pour ajouter des notes…";
    ph.addEventListener("click",()=>{s.noteEdit=true;R();});
    nd.append(ph);
  } else {
    // Textarea edit mode
    const ta=h("textarea",{id:"ni",placeholder:"Notes, liens, idées…",style:{width:"100%",padding:"11px 12px",borderRadius:"8px",border:"1.5px solid var(--accent)",fontSize:"14px",fontFamily:"inherit",outline:"none",color:"var(--text)",resize:"vertical",minHeight:"80px",maxHeight:"200px",lineHeight:"1.5"}});
    ta.value=noteVal;
    ta.addEventListener("input",e=>{up(p.id,{note:e.target.value},true);});
    ta.addEventListener("blur",()=>{setTimeout(()=>{if(s.ed)s.noteEdit=false;R();},200);});
    nd.append(ta);
  }
  m.append(nd);

  const ft=h("div",{style:{display:"flex",justifyContent:"space-between",paddingTop:"12px",borderTop:"1px solid var(--border)"}});
  ft.append(
    h("button",{className:"btn btn-g",style:{color:"var(--red)",borderColor:"rgba(226,68,92,.2)"},onClick:()=>cfm("Supprimer ce projet ?",()=>{ps(s.p.filter(x=>x.id!==p.id));s.ed=null;})},"Supprimer"),
    h("button",{className:"btn btn-a",onClick:()=>{s.ed=null;R();}},"Fermer")
  );
  m.append(ft);ov.append(m);document.getElementById("app").append(ov);
}

function rExp(){
  let md="# Projets\n\n";
  const g={"In Progress":[],"To Do":[],"Done":[]};s.p.forEach(p=>{if(g[p.status])g[p.status].push(p);});
  for(const[x,items]of Object.entries(g)){if(!items.length)continue;md+="## "+x+" ("+items.length+")\n\n";items.forEach(p=>{md+="### "+p.name+"\n";if(p.tasks?.length)p.tasks.forEach(t=>{md+="- ["+(tSt(t)==="done"?"x":tSt(t)==="progress"?"/":" ")+"] "+t.text+"\n";});const n=getNote(p);if(n)md+="\n"+n+"\n";md+="\n";});}
  const ov=h("div",{className:"ov",onClick:()=>{s.exp=false;R();}});
  const m=h("div",{className:"mod",onClick:e=>e.stopPropagation()});
  m.append(h("div",{className:"mod-hdr"},h("h3",{},"Export Markdown"),h("button",{className:"mod-x",onClick:()=>{s.exp=false;R();}},"✕")));
  const w=h("div",{style:{position:"relative"}});
  w.append(h("pre",{style:{background:"var(--dark)",color:"#E6E9EF",padding:"16px",borderRadius:"10px",fontSize:"12px",lineHeight:"1.5",maxHeight:"400px",overflowY:"auto",whiteSpace:"pre-wrap",wordBreak:"break-word",fontFamily:"monospace"}},md));
  w.append(h("button",{className:"btn btn-g",style:{position:"absolute",top:"8px",right:"8px",fontSize:"11px",padding:"4px 10px"},onClick:()=>navigator.clipboard.writeText(md)},"Copier"));
  m.append(w);ov.append(m);document.getElementById("app").append(ov);
}

function rKeys(){
  const ov=h("div",{className:"ov",onClick:()=>{s.keys=false;R();}});
  const m=h("div",{className:"mod",style:{maxWidth:"380px"},onClick:e=>e.stopPropagation()});
  m.append(h("div",{className:"mod-hdr"},h("h3",{},"Raccourcis"),h("button",{className:"mod-x",onClick:()=>{s.keys=false;R();}},"✕")));
  const kb=t=>h("kbd",{style:{display:"inline-flex",alignItems:"center",justifyContent:"center",minWidth:"24px",padding:"2px 7px",borderRadius:"5px",background:"var(--bg)",border:"1px solid var(--border)",fontSize:"12px",fontWeight:"600",color:"var(--accent)",fontFamily:"monospace"}},t);
  const rw=(l,k)=>h("div",{style:{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid var(--border)"}},h("span",{style:{color:"var(--sec)",fontSize:"13px"}},l),kb(k));
  const sc=t=>h("div",{style:{fontSize:"10px",fontWeight:"700",color:"var(--accent)",textTransform:"uppercase",letterSpacing:".06em",padding:"12px 0 2px"}},t);
  m.append(sc("Vue liste"),rw("Focus saisie","N"),rw("Export","E"),rw("Fermer","Esc"),sc("Projet ouvert"),rw("Tâche","T"),rw("Note","N"),rw("Statut","1–3"));
  ov.append(m);document.getElementById("app").append(ov);
}

function rCfm(){
  const ov=document.createElement("div");
  ov.className="ov";
  ov.style.zIndex="2000";
  ov.style.alignItems="center";
  ov.style.padding="16px";
  // Block ALL events from reaching layers below
  ov.addEventListener("click",e=>{e.stopPropagation();e.preventDefault();xcfm();});
  ov.addEventListener("touchend",e=>{e.stopPropagation();});
  const box=h("div",{className:"cfm"});
  box.addEventListener("click",e=>e.stopPropagation());
  box.addEventListener("touchend",e=>e.stopPropagation());
  box.append(
    h("p",{},s.cm),
    h("div",{style:{display:"flex",gap:"12px",justifyContent:"center"}},
      h("button",{className:"btn btn-g",style:{padding:"12px 28px",fontSize:"14px",minHeight:"48px"},onClick:e=>{e.stopPropagation();xcfm();}},"Annuler"),
      h("button",{className:"btn btn-r",style:{padding:"12px 28px",fontSize:"14px",minHeight:"48px"},onClick:e=>{e.stopPropagation();s.cf?.();xcfm();}},"Confirmer")
    )
  );
  ov.append(box);
  document.getElementById("app").append(ov);
}
</script>
