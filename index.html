<style>
/* Flatpickr Task.r theme */
.flatpickr-calendar{font-family:'Figtree',system-ui,sans-serif !important;border:1.5px solid var(--border) !important;border-radius:10px !important;box-shadow:0 8px 24px rgba(0,0,0,.08) !important;background:var(--card) !important;}
.flatpickr-innerContainer{padding:0 10px 8px !important;}
.flatpickr-months .flatpickr-month{background:var(--card) !important;color:var(--text) !important;border-radius:10px 10px 0 0;}
.flatpickr-current-month{color:var(--text) !important;font-weight:600 !important;font-size:13px !important;}
.flatpickr-months .flatpickr-prev-month,.flatpickr-months .flatpickr-next-month{color:var(--sec) !important;fill:var(--sec) !important;}
.flatpickr-months .flatpickr-prev-month:hover,.flatpickr-months .flatpickr-next-month:hover{color:var(--accent) !important;fill:var(--accent) !important;}
span.flatpickr-weekday{color:var(--sec) !important;font-weight:600 !important;font-size:10px !important;}
.flatpickr-day{color:var(--text) !important;border-radius:6px !important;font-size:12px !important;font-weight:500 !important;height:30px !important;line-height:30px !important;}
.flatpickr-day:hover{background:var(--hover) !important;border-color:transparent !important;}
.flatpickr-day.selected,.flatpickr-day.selected:hover{background:var(--accent) !important;color:#fff !important;border-color:var(--accent) !important;}
.flatpickr-day.today{border-color:var(--accent) !important;color:var(--accent) !important;font-weight:700 !important;}
.flatpickr-day.today.selected{color:#fff !important;}
.flatpickr-day.flatpickr-disabled,.flatpickr-day.prevMonthDay,.flatpickr-day.nextMonthDay{color:var(--muted) !important;}
.numInputWrapper span{display:none !important;}
[contenteditable]:empty::before{content:attr(data-ph);color:var(--muted);pointer-events:none;}

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#F6F7FB;--card:#FFF;--dark:#181B34;
  --accent:#6161FF;--green:#00C875;--amber:#FDAB3D;--red:#E2445C;--blue:#0086C0;
  --text:#323338;--sec:#676879;--muted:#C3C6D4;
  --border:#E6E9EF;--hover:#F5F6F8;
}
:root.theme-dark{
  --bg:#1e1e1e;--card:#282828;--dark:#e8e8e8;
  --accent:#de4c4a;--green:#4caf50;--amber:#ff9f1a;--red:#ff5555;--blue:#5297e5;
  --text:#e8e8e8;--sec:#a0a0a0;--muted:#5a5a5a;
  --border:#3a3a3a;--hover:#333333;
}
:root.theme-ims-dark{
  --bg:#000000;--card:#0a0a0a;--dark:#55bbff;
  --accent:#55bbff;--green:#44dd44;--amber:#ffff00;--red:#ff4444;--blue:#55bbff;
  --text:#44dd44;--sec:#55bbff;--muted:#336688;
  --border:#1a2a44;--hover:#0d0d1a;
}
:root.theme-ims-blue{
  --bg:#001a33;--card:#002244;--dark:#44ff44;
  --accent:#5599ff;--green:#44ff44;--amber:#ffff00;--red:#ff5555;--blue:#5599ff;
  --text:#33dd33;--sec:#55bb88;--muted:#336655;
  --border:#1a4466;--hover:#002b4d;
}
:root.theme-ims-green{
  --bg:#001200;--card:#001a00;--dark:#33ff33;
  --accent:#33ff33;--green:#33ff33;--amber:#ccff33;--red:#ff4444;--blue:#33ff33;
  --text:#33ff33;--sec:#22aa22;--muted:#1a6622;
  --border:#1a3a1a;--hover:#0d220d;
}
.theme-dark [contenteditable]{background:var(--card) !important;color:var(--text) !important;border-color:var(--border) !important;}
.theme-dark input,.theme-dark textarea{background:var(--card) !important;color:var(--text) !important;border-color:var(--border) !important;}
.theme-dark .ac-list{background:var(--card) !important;border-color:var(--border) !important;}
.theme-dark .ac-item.sel{background:var(--hover) !important;}
.theme-dark .mod{background:var(--card) !important;}
.theme-dark .cfm{background:var(--card) !important;}
.theme-dark .quick{background:var(--card) !important;border-color:var(--border) !important;}
[class*="theme-ims"]{font-family:'IBM 3270','IBM Plex Mono','Courier New',monospace !important;}
[class*="theme-ims"] body{font-family:'IBM 3270','IBM Plex Mono','Courier New',monospace !important;font-size:16px !important;}
[class*="theme-ims"] .topbar h1{letter-spacing:.05em;text-transform:uppercase;}
[class*="theme-ims"] .mention{background:rgba(0,224,255,.12) !important;color:var(--accent) !important;border-radius:2px !important;}
[class*="theme-ims"] .bx,[class*="theme-ims"] .bx-s{border-color:var(--sec);border-radius:0 !important;}
[class*="theme-ims"] .crd{border-radius:0 !important;}
[class*="theme-ims"] .row:hover{border-radius:0 !important;}
[class*="theme-ims"] .row-urgent{border-radius:0 !important;}
[class*="theme-ims"] .mod{border-radius:2px 2px 0 0 !important;}
[class*="theme-ims"] .itasks{border-left-style:solid !important;}
[class*="theme-ims"] [contenteditable]{background:var(--card) !important;color:var(--text) !important;border-color:var(--border) !important;font-family:'IBM 3270','IBM Plex Mono','Courier New',monospace !important;border-radius:0 !important;}
[class*="theme-ims"] input,[class*="theme-ims"] textarea{background:var(--card) !important;color:var(--text) !important;border-color:var(--border) !important;font-family:'IBM 3270','IBM Plex Mono','Courier New',monospace !important;border-radius:0 !important;}
[class*="theme-ims"] .ac-list{background:var(--card) !important;border-color:var(--border) !important;border-radius:0 !important;}
[class*="theme-ims"] .ac-item.sel{background:var(--hover) !important;}
[contenteditable] a{color:var(--accent) !important;text-decoration:underline !important;cursor:pointer !important;}
[contenteditable] table{border-collapse:collapse;width:100%;margin:6px 0;font-size:12px;}
[contenteditable] th,[contenteditable] td{border:1px solid var(--border);padding:4px 8px;text-align:left;}
[contenteditable] th{background:var(--hover);font-weight:600;font-size:11px;}
[contenteditable] tr:nth-child(even){background:var(--hover);}
[contenteditable] ul,[contenteditable] ol{padding-left:20px;margin:4px 0;}
[contenteditable] li{margin:2px 0;}
[contenteditable] h1{font-size:16px;margin:8px 0 4px;}
[contenteditable] h2{font-size:15px;margin:6px 0 4px;}
[contenteditable] h3{font-size:14px;margin:6px 0 3px;}
[contenteditable] h4,[contenteditable] h5,[contenteditable] h6{font-size:13px;margin:4px 0 2px;}
[class*="theme-ims"] ::selection{background:var(--accent);color:#000;}
body{font-family:'Figtree',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom,0);-webkit-tap-highlight-color:transparent;font-size:13px;}
::selection{background:var(--accent);color:#fff;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

.wrap{max-width:680px;margin:0 auto;padding:24px 20px calc(40px + env(safe-area-inset-bottom,0));padding-left:max(20px,env(safe-area-inset-left,0));padding-right:max(20px,env(safe-area-inset-right,0));}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.topbar h1{font-size:38px;font-weight:700;color:var(--dark);letter-spacing:-.04em;}
.topbar .sync{font-size:10px;font-weight:600;margin-left:8px;}
.icon-btn{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.icon-btn:hover{background:var(--hover);color:var(--sec);}

.quick{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:24px;transition:border-color .2s,box-shadow .2s;box-shadow:0 1px 3px rgba(0,0,0,.03);position:relative;z-index:50;}
.quick:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(97,97,255,.1);}
.quick input{width:100%;border:none;outline:none;font-size:14px;font-family:inherit;color:var(--text);background:transparent;}
.quick input::placeholder{color:var(--muted);}

.sec-hdr{display:flex;align-items:center;gap:8px;padding:6px 0;margin-bottom:4px;margin-top:20px;}
.sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sec-label{font-size:12px;font-weight:600;color:var(--sec);text-transform:uppercase;letter-spacing:.04em;}
.sec-count{font-size:11px;color:var(--muted);font-weight:500;}
.sec-toggle{background:none;border:none;cursor:pointer;color:var(--sec);font-size:13px;transition:transform .2s;padding:2px 4px;}
.sec-toggle.open{transform:rotate(90deg);}
.sec-line{flex:1;height:1px;background:var(--border);}

.cards{display:flex;flex-direction:column;gap:1px;}
.row{display:flex;align-items:flex-start;transition:opacity .15s;min-width:0;overflow:visible;}
.row.dragging{opacity:.15;pointer-events:none;}
.row.drag-clone{position:fixed;left:0;right:0;z-index:9999;opacity:.9;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.15);background:var(--card);border-radius:8px;border:1.5px solid rgba(97,97,255,.25);}
.drop-line{height:0;transition:height .15s ease;position:relative;overflow:visible;}
.drop-line.active{height:10px;}
.drop-line::before{content:"";position:absolute;top:50%;left:0;right:0;height:3px;margin-top:-1.5px;background:var(--accent);border-radius:2px;opacity:0;transition:opacity .1s;}
.drop-line.active::before{opacity:1;}
.drop-line::after{content:"";position:absolute;top:50%;left:-2px;width:8px;height:8px;margin-top:-4px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity .1s;}
.drop-line.active::after{opacity:1;}
.grip{width:24px;padding-top:13px;display:flex;justify-content:center;flex-shrink:0;cursor:grab;color:var(--muted);font-size:14px;opacity:1;transition:opacity .15s;user-select:none;-webkit-user-select:none;letter-spacing:1px;}
.grip:active{cursor:grabbing;}
.row:hover .grip{opacity:1;}
.chk{width:44px;min-height:44px;padding-top:11px;display:flex;justify-content:center;flex-shrink:0;cursor:pointer;}

.bx{width:20px;height:20px;border-radius:4px;border:2px solid var(--muted);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .15s;cursor:pointer;color:transparent;user-select:none;}
.bx.ip{border-color:var(--amber);color:var(--amber);background:var(--card);}
.bx.dn{border-color:var(--green);background:var(--green);color:#fff;}
.bx-s{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--muted);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all .15s;cursor:pointer;color:transparent;flex-shrink:0;user-select:none;margin-top:1px;}
.bx-s.ip{border-color:var(--amber);color:var(--amber);background:var(--card);}
.bx-s.dn{border-color:var(--green);background:var(--green);color:#fff;}

.crd{flex:1;min-width:0;overflow:hidden;padding:10px 14px;border-radius:8px;cursor:pointer;transition:background .12s;}
.crd.crd-open{overflow:visible !important;cursor:default;}
.row:hover{background:var(--hover);border-radius:8px;}
.row-urgent:hover{background:rgba(226,68,92,.08) !important;}
.done-anim .crd-name{text-decoration:line-through;color:var(--muted) !important;transition:color .3s,text-decoration .3s;}
.done-anim{opacity:.4;transition:opacity .8s ease .3s;}
.crd-top{display:flex;align-items:flex-start;gap:10px;}
.crd-name{font-size:14px;font-weight:500;line-height:1.35;flex:1;min-width:0;word-break:break-word;}
.crd-name.x{text-decoration:line-through;color:var(--muted);}
.crd-name.x .mention{color:var(--muted);background:rgba(103,104,121,.05);text-decoration:line-through;}
.meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);flex-shrink:0;}
.prog{width:36px;height:3px;border-radius:2px;background:var(--border);overflow:hidden;}
.prog-f{height:100%;border-radius:2px;transition:width .3s;}

.itasks{margin-top:6px;display:flex;flex-direction:column;margin-left:28px;}
.it{display:flex;align-items:flex-start;gap:6px;padding:8px 0;font-size:13px;color:var(--text);min-height:32px;}
.it span.x{color:var(--muted);text-decoration:line-through;}
.it span.x .mention{color:var(--muted);background:rgba(103,104,121,.05);text-decoration:line-through;}
.it span{word-break:break-word;min-width:0;}

.ov{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.22);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;padding:0;}
.mod{background:var(--card);border-radius:16px 16px 0 0;padding:24px;padding-bottom:calc(24px + env(safe-area-inset-bottom,0));width:100%;max-width:500px;max-height:95vh;overflow-y:auto;box-shadow:0 -8px 48px rgba(0,0,0,.12);}
.mod h3{font-size:17px;font-weight:700;color:var(--dark);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.mod-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.mod-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;}
.mod label{font-size:11px;font-weight:600;color:var(--sec);display:block;margin-bottom:4px;}
.mod input{width:100%;padding:11px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:16px;font-family:inherit;outline:none;color:var(--text);transition:border-color .15s;}
.mod input:focus{border-color:var(--accent);}
.tr{display:flex;gap:6px;align-items:center;padding:10px 8px;border-radius:6px;font-size:13px;border-left:3px solid transparent;min-height:44px;}
.tr:hover{background:var(--hover);}
.tr.done-bg{background:rgba(0,200,117,.04);border-left-color:var(--green);}
.tr.prog-bg{border-left-color:var(--amber);}
.nr{display:flex;gap:8px;align-items:flex-start;padding:10px 8px;border-radius:6px;font-size:13px;line-height:1.35;border-left:3px solid var(--border);min-height:44px;}
.nr:hover{background:var(--hover);}
.rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px 6px;line-height:1;opacity:1;transition:opacity .15s;}
.cfm{background:var(--card);border-radius:12px;padding:28px;width:100%;max-width:340px;box-shadow:0 16px 48px rgba(0,0,0,.12);text-align:center;}
.cfm p{margin:0 0 20px;font-size:15px;font-weight:600;}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:14px;font-family:inherit;transition:all .15s;min-height:44px;}
.btn:hover{opacity:.88;}
.btn-a{background:var(--accent);color:#fff;}
.btn-r{background:var(--red);color:#fff;}
.btn-g{background:transparent;color:var(--sec);border:1px solid var(--border);}
.btn-t{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;padding:8px;min-height:44px;}
.btn-t:hover{color:var(--sec);}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px;}
.mention{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:10px;background:rgba(103,104,121,.08);color:var(--sec);font-size:inherit;font-weight:600;white-space:nowrap;line-height:1.4;}
.it.urgent{background:rgba(226,68,92,.05);border-radius:4px;margin:0 -4px;padding-left:4px;padding-right:4px;color:var(--red);}
.it.urgent .bx-s{border-color:var(--red);}
.it.urgent .mention{color:var(--red) !important;background:rgba(226,68,92,.1) !important;}
.row-urgent{background:rgba(226,68,92,.04) !important;border-radius:8px;}
.row-urgent .crd-name{color:var(--red) !important;}
.row-urgent .meta{color:var(--red) !important;}
.row-urgent .meta svg{color:var(--red) !important;}
.row-urgent .prog{background:rgba(226,68,92,.15) !important;}
.row-urgent .mention{color:var(--red) !important;background:rgba(226,68,92,.1) !important;}
.ac-list{position:absolute;left:0;right:0;top:100%;margin-top:2px;background:var(--card);border:1.5px solid var(--border);border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.08);z-index:9999;max-height:160px;overflow-y:auto;}
.ac-item{padding:5px 10px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.ac-item:hover,.ac-item.sel{background:var(--hover);}
.ac-item .ac-av{width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Desktop overrides */
@media(min-width:600px){
  .ov{align-items:center;padding:16px;}
  .mod{border-radius:12px;padding:24px;padding-bottom:24px;max-height:92vh;box-shadow:0 16px 48px rgba(0,0,0,.12);}
  .rm{opacity:0;transition:opacity .15s;}
  .tr:hover .rm,.nr:hover .rm,.it:hover .rm,.row:hover .rm{opacity:1 !important;}
}
/* Mobile tweaks — Todoist-inspired */
@media(max-width:599px){
  .wrap{padding-left:12px;padding-right:12px;}
  .topbar h1{font-size:30px;margin-bottom:4px;}
  .quick{padding:14px 16px;margin-bottom:20px;}
  .quick input{font-size:16px;}

  /* Sections */
  .sec-hdr{margin-top:24px;margin-bottom:8px;}
  .sec-toggle{padding:8px 10px;font-size:16px;}

  /* Rows — more vertical breathing room + separator */
  .cards{gap:0;}
  .row{padding:14px 0;border-bottom:1px solid var(--border);border-radius:0 !important;align-items:flex-start;}
  .row:last-child{border-bottom:none;}
  .row:hover{background:transparent;border-radius:0 !important;}
  .row-urgent{border-radius:0 !important;}
  .done-anim{border-radius:0 !important;}

  /* Checkbox — keep square style */
  .chk{width:40px;min-height:44px;padding-top:2px;}
  .bx{width:22px;height:22px;}
  .bx-s{width:18px;height:18px;}

  /* Card content */
  .crd{padding:0 4px 0 0;border-radius:0 !important;}
  .crd-name{font-size:15px;font-weight:400;line-height:1.45;}
  .crd-top{flex-wrap:wrap;gap:4px;}

  /* Meta below title */
  .meta{width:100%;order:1;margin-top:4px;font-size:12px;gap:8px;}

  /* Subtasks */
  .itasks{margin-left:22px;margin-top:6px;}
  .it{padding:8px 0;font-size:14px;min-height:36px;}

  /* Grip */
  .grip{opacity:1;min-height:48px;width:28px;font-size:18px;touch-action:none;-webkit-touch-callout:none;user-select:none;}

  /* Icons */
  .icon-btn{width:36px;height:36px;font-size:15px;}

  /* Hide desktop-only */
  .desktop-only{display:none !important;}

  /* Hide desktop quick add on mobile */
  .quick{display:none !important;}

  /* FAB — floating action button */
  .fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0));right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:28px;font-weight:300;cursor:pointer;box-shadow:0 4px 16px rgba(97,97,255,.35);z-index:900;display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;}
  .fab:active{transform:scale(.92);box-shadow:0 2px 8px rgba(97,97,255,.3);}
}
</style>

function clearDropLines(){document.querySelectorAll(".drop-line.active").forEach(d=>d.classList.remove("active"));}
function findDropTarget(y){
  const rows=document.querySelectorAll('.row[data-id]');
  let best=null,bestDist=Infinity;
  rows.forEach(r=>{
    if(r.getAttribute("data-id")===dragId)return;
    const rc=r.getBoundingClientRect();
    const mid=rc.top+rc.height/2;
    const dist=Math.abs(y-mid);
    if(dist<bestDist){bestDist=dist;best={el:r,id:r.getAttribute("data-id"),above:y<mid};}
  });
  return best;
}
function onDragMove(e){
  if(!dragClone)return;
  e.preventDefault();
  const y=(e.clientY||e.touches?.[0]?.clientY||0);
  dragClone.style.top=(y-dragRowH/2)+"px";
  const t=findDropTarget(y);
  if(!t)return;
  const key=t.id+(t.above?"a":"b");
  if(lastDragOver===key)return;
  lastDragOver=key;
  clearDropLines();
  // Find or create drop-line before/after target
  const lineId="dl-"+t.id+(t.above?"-a":"-b");
  let line=document.getElementById(lineId);
  if(!line){
    line=document.createElement("div");
    line.className="drop-line";line.id=lineId;
    if(t.above)t.el.parentElement.insertBefore(line,t.el);
    else t.el.parentElement.insertBefore(line,t.el.nextSibling);
  }
  requestAnimationFrame(()=>line.classList.add("active"));
}
function onDragEnd(){
  if(!dragClone)return;
  document.removeEventListener("mousemove",onDragMove);
  document.removeEventListener("mouseup",onDragEnd);
  document.removeEventListener("touchmove",onDragMove);
  document.removeEventListener("touchend",onDragEnd);
  document.removeEventListener("touchcancel",onDragEnd);
  dragClone.remove();dragClone=null;
  // Find active drop line to determine target
  const active=document.querySelector(".drop-line.active");
  if(active){
    const lineId=active.id;// dl-{id}-a or dl-{id}-b
    const suffix=lineId.slice(-1);// 'a' or 'b'
    const targetId=lineId.slice(3,-2);// remove 'dl-' and '-a'/'-b'
    if(targetId&&targetId!==dragId)reorder(dragId,targetId,suffix==="a");
  }
  dragId=null;lastDragOver=null;
  document.querySelectorAll(".drop-line").forEach(d=>d.remove());
  document.querySelectorAll(".row.dragging").forEach(r=>r.classList.remove("dragging"));

function parseTask(txt){

  while((m=re.exec(txt))!==null){

let acList=null,acOpen2=false,acIdx2=0,acFiltered2=[],acInput=null;

function acClose(){

// Extract @mentions from text, return {tags:[], clean:""}
function extractTags(txt){
  const tags=[];
  const re=new RegExp(NAME_RE.source,"g");
  let m;
  while((m=re.exec(txt))!==null){
    const match=TEAM.find(t=>t.toLowerCase()===m[1].toLowerCase());
    if(match&&!tags.includes(match))tags.push(match);
  }
  let clean=txt;
  tags.forEach(t=>{clean=clean.replace(new RegExp("@"+t+"\\s*","gi"),"");});
  clean=clean.replace(/\s{2,}/g," ").trim();
  return {tags,clean};
}

// Rebuild full value from tags + text
function buildVal(tags,text){
  const capText=text?text.charAt(0).toUpperCase()+text.slice(1):text;
  let v=tags.map(t=>"@"+t).join(" ");
  if(v&&capText)v+=" ";
  return v+capText;
}

function acShow(q,wrap){
  acFiltered2=TEAM.filter(t=>t.toLowerCase().startsWith(q.toLowerCase()));
  if(!acFiltered2.length){acClose();return;}

  });

}

function acCheck(input,wrap){
  const v=input.value;
  const cur=input.selectionStart!=null?input.selectionStart:v.length;
  const before=v.slice(0,cur);
  const atIdx=before.lastIndexOf("@");
  if(atIdx>=0&&(atIdx===0||before[atIdx-1]===" ")){
    const q=before.slice(atIdx+1);
    if(q.length>=0&&!/\s/.test(q)){acInput=input;acShow(q,wrap);return;}
  }
  acClose();
}

// mentionField: input + chip bar above it
// opts: {value, placeholder, onInput, onEnter, style, focusEnd, inputStyle}
function mentionField(opts){
  const wrap=h("div",{style:{flex:"1",position:"relative"}});
  const {tags:initTags,clean:initClean}=extractTags(opts.value||"");
  let tags=[...initTags];

  // Tag bar
  const bar=h("div",{style:{display:"flex",flexWrap:"wrap",gap:"4px",padding:tags.length?"0 0 4px":"0"}});
  function renderBar(){
    bar.innerHTML="";
    bar.style.padding=tags.length?"0 0 4px":"0";
    tags.forEach((name,i)=>{
      const chip=mentionSpan(name);
      chip.style.cursor="pointer";chip.style.fontSize="12px";
      chip.addEventListener("click",e=>{e.stopPropagation();tags.splice(i,1);renderBar();fire();});
      bar.append(chip);
    });
  }
  renderBar();

  // Input
  const input=h("input",{value:initClean,placeholder:opts.placeholder||"",style:{
    width:"100%",border:"none",outline:"none",fontFamily:"inherit",color:"var(--text)",background:"transparent",padding:"0",margin:"0",fontSize:"14px",
    ...(opts.inputStyle||opts.style||{})
  }});

  function fire(){if(opts.onInput)opts.onInput(buildVal(tags,input.value.trim()));}

  wrap._pick=function(name){
    if(!tags.includes(name))tags.push(name);
    // Remove @query from input
    const v=input.value;
    const cur=input.selectionStart!=null?input.selectionStart:v.length;
    const before=v.slice(0,cur);
    const atIdx=before.lastIndexOf("@");
    if(atIdx>=0){
      input.value=v.slice(0,atIdx)+v.slice(cur);
    }
    renderBar();fire();acClose();
    input.focus();
  };

  input.addEventListener("input",()=>{fire();acCheck(input,wrap);});
  input.addEventListener("keyup",()=>acCheck(input,wrap));
  input.addEventListener("keydown",e=>{
    if(acOpen2){
      if(e.key==="ArrowDown"){e.preventDefault();acIdx2=Math.min(acIdx2+1,acFiltered2.length-1);if(acList)acList.querySelectorAll(".ac-item").forEach((it,i)=>it.classList.toggle("sel",i===acIdx2));}
      else if(e.key==="ArrowUp"){e.preventDefault();acIdx2=Math.max(acIdx2-1,0);if(acList)acList.querySelectorAll(".ac-item").forEach((it,i)=>it.classList.toggle("sel",i===acIdx2));}
      else if(e.key==="Enter"&&acFiltered2[acIdx2]){e.preventDefault();e.stopImmediatePropagation();wrap._pick(acFiltered2[acIdx2]);return;}
      else if(e.key==="Escape"){e.preventDefault();acClose();return;}
    }
    // Backspace on empty input → remove last tag
    if(e.key==="Backspace"&&input.value===""&&tags.length){
      e.preventDefault();tags.pop();renderBar();fire();return;
    }
    if(e.key==="Enter"&&!acOpen2&&opts.onEnter){e.preventDefault();opts.onEnter();}
  });
  input.addEventListener("blur",()=>setTimeout(acClose,200));

  wrap.append(bar,input);
  if(opts.focusEnd)requestAnimationFrame(()=>{input.focus();input.selectionStart=input.selectionEnd=input.value.length;});

  wrap._input=input;
  wrap._getTags=()=>tags;
  return wrap;
}

// ─── Cycle: To Do → In Progress → Done → To Do ───
const NEXT={"To Do":"In Progress","In Progress":"Done","Done":"To Do"};
const PREV={"In Progress":"To Do","Done":"In Progress","To Do":"Done"};
const TNEXT={"todo":"progress","progress":"done","done":"todo"};
const TPREV={"progress":"todo","done":"progress","todo":"done"};
const UNDO_MS=2000;
const lastTogP={};
const lastTogT={};

function togP(id,reverse){
  const p=s.p.find(x=>x.id===id);if(!p)return;
  const now=Date.now();
  // Quick re-click → undo
  if(lastTogP[id]&&(now-lastTogP[id].t)<UNDO_MS){
    const prev=lastTogP[id].st;
    const patch={status:prev};
    if(prev==="Done"){patch.doneAt=td();patch.tasks=(p.tasks||[]).map(t=>({...t,st:"done",doneAt:t.doneAt||td()}));}
    else{patch.doneAt=null;patch.tasks=(p.tasks||[]).map(t=>{const o={...t,st:"todo"};delete o.doneAt;return o;});}
    delete lastTogP[id];
    up(id,patch);return;
  }
  const next=reverse?(PREV[p.status]||"Done"):(NEXT[p.status]||"To Do");
  lastTogP[id]={t:now,st:p.status};
  setTimeout(()=>{if(lastTogP[id]&&(Date.now()-lastTogP[id].t)>=UNDO_MS)delete lastTogP[id];},UNDO_MS+50);
  const patch={status:next};
  const nowD=td();
  if(next==="Done"){patch.doneAt=nowD;patch.tasks=(p.tasks||[]).map(t=>({...t,st:"done",doneAt:t.doneAt||nowD}));}
  if(next==="To Do"){delete patch.doneAt;patch.tasks=(p.tasks||[]).map(t=>{const o={...t,st:"todo"};delete o.doneAt;return o;});}
  // Animate before moving to Done
  if(next==="Done"){
    up(id,patch,true);// save but don't render yet
    const row=document.querySelector('[data-id="'+id+'"]');
    if(row){
      row.classList.add("done-anim");
      // Animate checkbox to done state
      const bx=row.querySelector(".bx");
      if(bx){bx.classList.remove("ip");bx.classList.add("dn");bx.textContent="✓";}
      setTimeout(()=>qR(),1500);
    }
    else qR();
  } else up(id,patch);
}

function togT(pid,i,reverse){
  const p=s.p.find(x=>x.id===pid);if(!p)return;
  const t=(p.tasks||[])[i];if(!t)return;
  const now=Date.now();
  const tk=pid+"-"+i;
  // Quick re-click → undo
  if(lastTogT[tk]&&(now-lastTogT[tk].t)<UNDO_MS){
    const ts=[...(p.tasks||[])];
    const prev=lastTogT[tk].st;
    const nt={...t,st:prev};
    if(prev==="done")nt.doneAt=td();else delete nt.doneAt;
    ts[i]=nt;
    delete lastTogT[tk];
    up(pid,{tasks:ts});return;
  }
  lastTogT[tk]={t:now,st:tSt(t)};
  setTimeout(()=>{if(lastTogT[tk]&&(Date.now()-lastTogT[tk].t)>=UNDO_MS)delete lastTogT[tk];},UNDO_MS+50);
  const ts=[...(p.tasks||[])];
  const nst=reverse?(TPREV[tSt(t)]||"done"):(TNEXT[tSt(t)]||"todo");
  const nt={...t,st:nst};
  if(nst==="done") nt.doneAt=td();
  else delete nt.doneAt;
  ts[i]=nt;
  const patch={tasks:ts};
  if(tSt(t)==="todo"&&p.status==="To Do") patch.status="In Progress";
  if(tSt(t)==="done"&&nst!=="done"&&p.status==="Done"){patch.status="In Progress";patch.doneAt=null;}
  up(pid,patch,true);
  const cur=s.p.find(x=>x.id===pid);
  const allDone=cur&&cur.tasks&&cur.tasks.length&&cur.tasks.every(t2=>tSt(t2)==="done")&&cur.status!=="Done";
  if(nst==="done"){
    // Animate subtask strikethrough then render
    const rows=document.querySelectorAll('[data-id="'+pid+'"] .it');
    if(rows[i]){
      // Animate checkbox
      const bx=rows[i].querySelector(".bx-s");
      if(bx){bx.classList.remove("ip");bx.classList.add("dn");bx.textContent="✓";}
      const sp=rows[i].querySelector("span");

      rows[i].style.opacity=".4";rows[i].style.transition="opacity .5s ease .2s";
    }
    setTimeout(()=>{
      if(allDone)up(pid,{status:"Done",doneAt:td()});
      else R();
    },1500);
  } else {
    if(allDone)up(pid,{status:"Done",doneAt:td()});
    else R();
  }
}

function rExp(){
  // Generate markdown from data
  function toMd(){
    let md="";
    const g={"In Progress":[],"To Do":[],"Done":[]};
    s.p.filter(p=>!p.hidden).forEach(p=>{if(g[p.status])g[p.status].push(p);});
    for(const[x,items]of Object.entries(g)){
      if(!items.length)continue;
      md+="## "+x+"\n\n";
      items.forEach(p=>{
        md+="### "+p.name+"\n";
        if(p.tasks?.length)p.tasks.forEach(t=>{
          md+="- ["+(tSt(t)==="done"?"x":tSt(t)==="progress"?"/":" ")+"] "+t.text+"\n";
        });
        const n=getNote(p);
        if(n)md+="\n"+n+"\n";
        md+="\n";
      });
    }
    return md.trim()+"\n";
  }
  // Parse markdown back to data
  function fromMd(md){
    const lines=md.split("\n");
    const projects=[];
    let curStatus=null,curProj=null,noteLines=[];
    function flushNote(){
      if(curProj&&noteLines.length){
        const txt=noteLines.join("\n").trim();
        if(txt)curProj.note=txt;
      }
      noteLines=[];
    }
    function flushProj(){
      flushNote();
      if(curProj)projects.push(curProj);
      curProj=null;
    }
    for(const line of lines){
      const statusM=line.match(/^## (In Progress|To Do|Done)/);
      if(statusM){flushProj();curStatus=statusM[1];continue;}
      const projM=line.match(/^### (.+)/);
      if(projM){
        flushProj();
        const existing=s.p.find(p=>p.name===projM[1].trim());
        curProj={id:existing?.id||gid(),name:projM[1].trim(),status:curStatus||"To Do",tasks:[],note:"",doneAt:existing?.doneAt||null,hidden:false};
        continue;
      }
      const taskM=line.match(/^- \[([ x\/])\] (.+)/);
      if(taskM&&curProj){
        flushNote();
        const st=taskM[1]==="x"?"done":taskM[1]==="/"?"progress":"todo";
        const existingT=(s.p.find(p=>p.name===curProj.name)?.tasks||[]).find(t=>t.text===taskM[2].trim());
        curProj.tasks.push({text:taskM[2].trim(),st,date:existingT?.date||td(),doneAt:st==="done"?(existingT?.doneAt||td()):undefined});
        continue;
      }
      if(curProj&&line.trim()===""&&!noteLines.length)continue;
      if(curProj)noteLines.push(line);
    }
    flushProj();
    // Keep hidden projects
    const hidden=s.p.filter(p=>p.hidden);
    return [...projects,...hidden];
  }

  const mdVal=toMd();
  const ov=h("div",{className:"ov"});
  let ovDown=false;
  ov.addEventListener("mousedown",e=>{ovDown=(e.target===ov);});
  ov.addEventListener("mouseup",e=>{if(ovDown&&e.target===ov){s.exp=false;R();}ovDown=false;});
  ov.addEventListener("touchend",e=>{if(e.target===ov){s.exp=false;R();}});
  const m=h("div",{className:"mod",style:{maxWidth:"680px",display:"flex",flexDirection:"column",overflow:"hidden",height:"90vh"},onClick:e=>e.stopPropagation()});

function rCalc(){
  const ov=h("div",{className:"ov"});
  let ovDown=false;
  ov.addEventListener("mousedown",e=>{ovDown=(e.target===ov);});
  ov.addEventListener("mouseup",e=>{if(ovDown&&e.target===ov){s.calc=false;R();}ovDown=false;});
  ov.addEventListener("touchend",e=>{if(e.target===ov){s.calc=false;R();}});
  const m=h("div",{className:"mod",style:{maxWidth:"360px"},onClick:e=>e.stopPropagation()});
  m.append(h("div",{className:"mod-hdr"},h("h3",{},"Calculatrice horaire"),h("button",{className:"mod-x",onClick:()=>{s.calc=false;R();}},"✕")));

  const WORK=7*60+10;// 7h10 en minutes
  let arrival=settings._calcArr||"08:00";
  let pause=settings._calcPause||30;

  function calcEnd(arr,pau){
    const [hh,mm]=arr.split(":").map(Number);
    if(isNaN(hh)||isNaN(mm))return"--:--";
    const total=hh*60+mm+WORK+pau;
    const eh=Math.floor(total/60)%24;
    const em=total%60;
    return String(eh).padStart(2,"0")+":"+String(em).padStart(2,"0");
  }

  // Result display
  const resultTime=h("div",{style:{fontSize:"36px",fontWeight:"700",color:"var(--accent)",fontFamily:"monospace",letterSpacing:".02em"}},calcEnd(arrival,pause));
  const resultSub=h("div",{style:{fontSize:"11px",color:"var(--muted)",marginTop:"4px"}},"Journée de 7h10");
  const result=h("div",{style:{textAlign:"center",padding:"20px 0",background:"var(--hover)",borderRadius:"10px",marginBottom:"16px"}});
  result.append(
    h("div",{style:{fontSize:"11px",color:"var(--sec)",fontWeight:"600",textTransform:"uppercase",letterSpacing:".04em",marginBottom:"6px"}},"Heure de sortie"),
    resultTime,
    resultSub
  );
  m.append(result);

  let departure=settings._calcDep||"";

  function calcOvertime(){
    if(!departure)return null;
    const [ah,am]=arrival.split(":").map(Number);
    const [dh,dm]=departure.split(":").map(Number);
    if(isNaN(ah)||isNaN(am)||isNaN(dh)||isNaN(dm))return null;
    const worked=(dh*60+dm)-(ah*60+am)-pause;
    const diff=worked-WORK;
    const sign=diff>=0?"+":"−";
    const abs=Math.abs(diff);
    return{diff,label:sign+Math.floor(abs/60)+"h"+String(abs%60).padStart(2,"0")};
  }

  function updateResult(){
    resultTime.textContent=calcEnd(arrival,pause);
    settings._calcArr=arrival;settings._calcPause=pause;settings._calcDep=departure;saveSettings(settings);
    // Overtime
    const ot=calcOvertime();
    if(ot){
      const color=ot.diff>=0?"var(--green)":"var(--red)";
      resultSub.innerHTML="";
      resultSub.style.marginTop="8px";
      resultSub.append(
        h("span",{style:{fontSize:"14px",fontWeight:"700",color,fontFamily:"monospace"}},ot.label),
        h("span",{style:{fontSize:"11px",color:"var(--muted)",marginLeft:"6px"}},"vs 7h10")
      );
    } else {
      resultSub.textContent="Journée de 7h10";
      resultSub.style.marginTop="4px";
    }
    // Update departure input border
    if(depIn)depIn.style.color=departure?"var(--text)":"var(--muted)";
    // Update quick buttons active state
    qp.querySelectorAll("button").forEach(b=>{
      const min=parseInt(b.textContent);
      const active=min===pause;
      b.style.borderColor=active?"var(--accent)":"var(--border)";
      b.style.background=active?"var(--accent)":"transparent";
      b.style.color=active?"#fff":"var(--sec)";
    });
  }

  // Auto-formatting time input: 0910 → 09:10
  function timeInput(value,onChange){
    const input=h("input",{type:"text",value,placeholder:"--:--",inputMode:"numeric",style:{fontSize:"14px",padding:"6px 10px",border:"1.5px solid var(--border)",borderRadius:"8px",fontFamily:"monospace",color:"var(--text)",background:"var(--card)",outline:"none",textAlign:"center",width:"80px"}});
    input.addEventListener("focus",()=>{input.style.borderColor="var(--accent)";input.select();});
    input.addEventListener("blur",()=>{input.style.borderColor="var(--border)";if(input.value.length===5)onChange(input.value);});
    input.addEventListener("input",()=>{
      const pos=input.selectionStart;
      const raw=input.value.replace(/[^0-9]/g,"").slice(0,4);
      let formatted=raw;
      if(raw.length>=3)formatted=raw.slice(0,2)+":"+raw.slice(2);
      if(input.value!==formatted){
        input.value=formatted;
        // Adjust cursor: if we just inserted the ":", move cursor forward
        const newPos=pos+(formatted.length>raw.length&&pos>=2?1:0);
        input.setSelectionRange(newPos,newPos);
      }
      if(formatted.length===5)onChange(formatted);
    });
    return input;
  }

  // Arrival input
  const arrRow=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid var(--border)"}});
  arrRow.append(h("span",{style:{fontSize:"13px",color:"var(--text)",fontWeight:"500"}},"Arrivée"));
  const arrIn=timeInput(arrival,v=>{arrival=v;updateResult();});
  arrRow.append(arrIn);
  m.append(arrRow);

  // Pause input (minutes)
  const pauseRow=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid var(--border)"}});
  pauseRow.append(h("span",{style:{fontSize:"13px",color:"var(--text)",fontWeight:"500"}},"Pause midi"));
  const pauseWrap=h("div",{style:{display:"flex",alignItems:"center",gap:"6px"}});
  const pauseIn=h("input",{type:"number",value:pause,min:"0",max:"120",step:"5",style:{fontSize:"14px",padding:"6px 8px",border:"1.5px solid var(--border)",borderRadius:"8px",fontFamily:"monospace",color:"var(--text)",background:"var(--card)",outline:"none",textAlign:"center",width:"60px"}});
  pauseIn.addEventListener("input",e=>{pause=parseInt(e.target.value)||0;updateResult();});
  pauseIn.addEventListener("focus",()=>{pauseIn.style.borderColor="var(--accent)";});
  pauseIn.addEventListener("blur",()=>{pauseIn.style.borderColor="var(--border)";});
  pauseWrap.append(pauseIn,h("span",{style:{fontSize:"11px",color:"var(--muted)"}},"min"));
  pauseRow.append(pauseWrap);
  m.append(pauseRow);

  // Quick pause buttons
  const qp=h("div",{style:{display:"flex",gap:"6px",padding:"12px 0",justifyContent:"center"}});
  [30,45,60,90].forEach(min=>{
    const active=pause===min;
    const b=h("button",{style:{padding:"4px 12px",borderRadius:"6px",fontSize:"11px",fontWeight:"600",cursor:"pointer",border:"1.5px solid "+(active?"var(--accent)":"var(--border)"),background:active?"var(--accent)":"transparent",color:active?"#fff":"var(--sec)",fontFamily:"inherit",transition:"all .15s"}});
    b.textContent=min+"'";
    b.addEventListener("click",()=>{pause=min;pauseIn.value=min;updateResult();});
    qp.append(b);
  });
  m.append(qp);

  // Departure field (optional)
  const depRow=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderTop:"1px solid var(--border)"}});
  depRow.append(h("span",{style:{fontSize:"13px",color:"var(--text)",fontWeight:"500"}},"Départ réel"));
  const depWrap=h("div",{style:{display:"flex",alignItems:"center",gap:"6px"}});
  const depIn=timeInput(departure,v=>{departure=v;updateResult();});
  depWrap.append(depIn);
  if(departure){
    const clearBtn=h("button",{style:{background:"none",border:"none",fontSize:"14px",cursor:"pointer",color:"var(--muted)",padding:"2px 4px",lineHeight:"1"}});
    clearBtn.textContent="×";
    clearBtn.addEventListener("click",()=>{departure="";depIn.value="";updateResult();});
    depWrap.append(clearBtn);
  }
  depRow.append(depWrap);
  m.append(depRow);

  // Initial update
  updateResult();

  ov.append(m);document.getElementById("app").append(ov);
  requestAnimationFrame(()=>{arrIn.focus();arrIn.select();});
}
