<style>
/* Flatpickr Task.r theme */
.flatpickr-calendar{font-family:'Figtree',system-ui,sans-serif !important;border:1.5px solid var(--border) !important;border-radius:10px !important;box-shadow:0 8px 24px rgba(0,0,0,.08) !important;background:var(--card) !important;}
.flatpickr-innerContainer{padding:0 10px 8px !important;}
.flatpickr-months .flatpickr-month{background:var(--card) !important;color:var(--text) !important;border-radius:10px 10px 0 0;}
.flatpickr-current-month{color:var(--text) !important;font-weight:600 !important;font-size:13px !important;}
.flatpickr-months .flatpickr-prev-month,.flatpickr-months .flatpickr-next-month{color:var(--sec) !important;fill:var(--sec) !important;}
.flatpickr-months .flatpickr-prev-month:hover,.flatpickr-months .flatpickr-next-month:hover{color:var(--accent) !important;fill:var(--accent) !important;}
span.flatpickr-weekday{color:var(--sec) !important;font-weight:600 !important;font-size:10px !important;}
.flatpickr-day{color:var(--text) !important;border-radius:6px !important;font-size:12px !important;font-weight:500 !important;height:30px !important;line-height:30px !important;}
.flatpickr-day:hover{background:var(--hover) !important;border-color:transparent !important;}
.flatpickr-day.selected,.flatpickr-day.selected:hover{background:var(--accent) !important;color:#fff !important;border-color:var(--accent) !important;}
.flatpickr-day.today{border-color:var(--accent) !important;color:var(--accent) !important;font-weight:700 !important;}
.flatpickr-day.today.selected{color:#fff !important;}
.flatpickr-day.flatpickr-disabled,.flatpickr-day.prevMonthDay,.flatpickr-day.nextMonthDay{color:var(--muted) !important;}
.numInputWrapper span{display:none !important;}
[contenteditable]:empty::before{content:attr(data-ph);color:var(--muted);pointer-events:none;}
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#F6F7FB;--card:#FFF;--dark:#181B34;
  --accent:#6161FF;--green:#00C875;--amber:#FDAB3D;--red:#E2445C;--blue:#0086C0;
  --text:#323338;--sec:#676879;--muted:#C3C6D4;
  --border:#E6E9EF;--hover:#EDEEF3;
}
:root.theme-dark{
  --bg:#1e1e1e;--card:#282828;--dark:#e8e8e8;
  --accent:#de4c4a;--green:#4caf50;--amber:#ff9f1a;--red:#ff5555;--blue:#5297e5;
  --text:#e8e8e8;--sec:#a0a0a0;--muted:#5a5a5a;
  --border:#3a3a3a;--hover:#333333;
}
.theme-dark [contenteditable]{background:var(--card) !important;color:var(--text) !important;border-color:var(--border) !important;}
.theme-dark input,.theme-dark textarea{background:var(--card) !important;color:var(--text) !important;border-color:var(--border) !important;}
.theme-dark .ac-list{background:var(--card) !important;border-color:var(--border) !important;}
.theme-dark .ac-item.sel{background:var(--hover) !important;}
.theme-dark .mod{background:var(--card) !important;}
.theme-dark .cfm{background:var(--card) !important;}
.theme-dark .quick{background:var(--card) !important;border-color:var(--border) !important;}
[contenteditable] a{color:var(--accent) !important;text-decoration:underline !important;cursor:pointer !important;}
[contenteditable] table{border-collapse:collapse;width:100%;margin:6px 0;font-size:12px;}
[contenteditable] th,[contenteditable] td{border:1px solid var(--border);padding:4px 8px;text-align:left;}
[contenteditable] th{background:var(--hover);font-weight:600;font-size:11px;}
[contenteditable] tr:nth-child(even){background:var(--hover);}
[contenteditable] ul,[contenteditable] ol{padding-left:20px;margin:4px 0;}
[contenteditable] li{margin:2px 0;}
[contenteditable] h1,[contenteditable] h2,[contenteditable] h3,[contenteditable] h4,[contenteditable] h5,[contenteditable] h6{font-weight:700;color:var(--text);}
[contenteditable] label{font-size:inherit;color:inherit;display:inline;}
[contenteditable] h1{font-size:16px;margin:8px 0 4px;}
[contenteditable] h2{font-size:15px;margin:6px 0 4px;}
[contenteditable] h3{font-size:14px;margin:6px 0 3px;}
[contenteditable] h4,[contenteditable] h5,[contenteditable] h6{font-size:13px;margin:4px 0 2px;}
body{font-family:'Figtree',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom,0);-webkit-tap-highlight-color:transparent;font-size:13px;}
::selection{background:var(--accent);color:#fff;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.wrap{max-width:680px;margin:0 auto;padding:24px 20px calc(40px + env(safe-area-inset-bottom,0));padding-left:max(20px,env(safe-area-inset-left,0));padding-right:max(20px,env(safe-area-inset-right,0));}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.topbar h1{font-size:38px;font-weight:700;color:var(--dark);letter-spacing:-.04em;}
.topbar .sync{font-size:10px;font-weight:600;margin-left:8px;}
.icon-btn{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.icon-btn:hover{background:var(--hover);color:var(--sec);}

.quick{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:24px;transition:border-color .2s,box-shadow .2s;box-shadow:0 1px 3px rgba(0,0,0,.03);position:relative;z-index:50;}
.quick:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(97,97,255,.1);}
.quick input{width:100%;border:none;outline:none;font-size:14px;font-family:inherit;color:var(--text);background:transparent;}
.quick input::placeholder{color:var(--muted);}

.sec-hdr{display:flex;align-items:center;gap:8px;padding:6px 0;margin-bottom:4px;margin-top:20px;}
.sec-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sec-label{font-size:14px;font-weight:600;color:var(--sec);text-transform:uppercase;letter-spacing:.04em;}
.sec-count{font-size:13px;color:var(--muted);font-weight:500;}
.sec-toggle{background:none;border:none;cursor:pointer;color:var(--sec);font-size:13px;transition:transform .2s;padding:2px 4px;}
.sec-toggle.open{transform:rotate(90deg);}
.hl{background:#FDEF6C;color:var(--text);border-radius:2px;padding:0 1px;}
.sec-line{flex:1;height:1px;background:var(--border);}

.cards{display:flex;flex-direction:column;gap:1px;}
.row{display:flex;align-items:flex-start;transition:opacity .15s;min-width:0;overflow:visible;}
.row.dragging{opacity:.15;pointer-events:none;}
.row.drag-clone{position:fixed;left:0;right:0;z-index:9999;opacity:.9;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.15);background:var(--card);border-radius:8px;border:1.5px solid rgba(97,97,255,.25);}
.drop-line{height:0;transition:height .15s ease;position:relative;overflow:visible;}
.drop-line.active{height:10px;}
.drop-line::before{content:"";position:absolute;top:50%;left:0;right:0;height:3px;margin-top:-1.5px;background:var(--accent);border-radius:2px;opacity:0;transition:opacity .1s;}
.drop-line.active::before{opacity:1;}
.drop-line::after{content:"";position:absolute;top:50%;left:-2px;width:8px;height:8px;margin-top:-4px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity .1s;}
.drop-line.active::after{opacity:1;}
.grip{width:24px;padding-top:13px;display:flex;justify-content:center;flex-shrink:0;cursor:grab;color:var(--muted);font-size:14px;opacity:1;transition:opacity .15s;user-select:none;-webkit-user-select:none;letter-spacing:1px;}
.grip:active{cursor:grabbing;}
.row:hover .grip{opacity:1;}
.chk{width:44px;min-height:44px;padding-top:11px;display:flex;justify-content:center;flex-shrink:0;cursor:pointer;}

@keyframes checkPop{0%{transform:scale(1);}40%{transform:scale(1.3);}100%{transform:scale(1);}}
.bx{width:20px;height:20px;border-radius:4px;border:2px solid var(--muted);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .15s;cursor:pointer;color:transparent;user-select:none;}
.bx.dn{border-color:var(--green);background:var(--green);color:#fff;animation:checkPop .3s ease;}
.bx.ip{border-color:var(--amber);color:var(--amber);background:var(--card);}

.crd{flex:1;min-width:0;overflow:hidden;padding:10px 14px;border-radius:8px;cursor:pointer;transition:background .12s;}
.crd.crd-open{overflow:visible !important;cursor:default;}
.row:hover{background:var(--hover);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.row-urgent:hover{background:rgba(226,68,92,.08) !important;}
.done-anim .crd-name{text-decoration:line-through;color:var(--muted) !important;transition:color .3s,text-decoration .3s;}
.done-anim{opacity:.4;transition:opacity .8s ease .3s;}
.crd-top{display:flex;align-items:flex-start;gap:10px;}
.crd-name{font-size:14px;font-weight:500;line-height:1.35;flex:1;min-width:0;word-break:break-word;}
.crd-name.x{text-decoration:line-through;color:var(--muted);}
.crd-name.x .mention{color:var(--muted);background:rgba(103,104,121,.05);text-decoration:line-through;}
.meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);flex-shrink:0;}
.prog{width:36px;height:3px;border-radius:2px;background:var(--border);overflow:hidden;}
.prog-f{height:100%;border-radius:2px;transition:width .3s;}


.ov{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.22);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;padding:0;}
.mod{background:var(--card);border-radius:16px 16px 0 0;padding:24px;padding-bottom:calc(24px + env(safe-area-inset-bottom,0));width:100%;max-width:500px;max-height:95vh;overflow-y:auto;box-shadow:0 -8px 48px rgba(0,0,0,.12);}
.mod h3{font-size:17px;font-weight:700;color:var(--dark);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.mod-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.mod-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;}
.mod label{font-size:11px;font-weight:600;color:var(--sec);display:block;margin-bottom:4px;}
.mod input{width:100%;padding:11px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:16px;font-family:inherit;outline:none;color:var(--text);transition:border-color .15s;}
.mod input:focus{border-color:var(--accent);}
.tr{display:flex;gap:6px;align-items:center;padding:10px 8px;border-radius:6px;font-size:13px;border-left:3px solid transparent;min-height:44px;}
.tr:hover{background:var(--hover);}
.tr.done-bg{background:rgba(0,200,117,.04);border-left-color:var(--green);}
.tr.prog-bg{border-left-color:var(--amber);}
.nr{display:flex;gap:8px;align-items:flex-start;padding:10px 8px;border-radius:6px;font-size:13px;line-height:1.35;border-left:3px solid var(--border);min-height:44px;}
.nr:hover{background:var(--hover);}
.rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px 6px;line-height:1;opacity:1;transition:opacity .15s;}
.cfm{background:var(--card);border-radius:12px;padding:28px;width:100%;max-width:340px;box-shadow:0 16px 48px rgba(0,0,0,.12);text-align:center;}
.cfm p{margin:0 0 20px;font-size:15px;font-weight:600;}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:14px;font-family:inherit;transition:all .15s;min-height:44px;}
.btn:hover{opacity:.88;}
.btn-a{background:var(--accent);color:#fff;}
.btn-r{background:var(--red);color:#fff;}
.btn-g{background:transparent;color:var(--sec);border:1px solid var(--border);}
.btn-t{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;padding:8px;min-height:44px;}
.btn-t:hover{color:var(--sec);}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px;}
.mention{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:10px;background:rgba(103,104,121,.08);color:var(--sec);font-size:inherit;font-weight:600;white-space:nowrap;line-height:1.4;}
.it.urgent{background:rgba(226,68,92,.05);border-radius:4px;margin:0 -4px;padding-left:4px;padding-right:4px;color:var(--red);}
.it.urgent .mention{color:var(--red) !important;background:rgba(226,68,92,.1) !important;}
.row-urgent{background:rgba(226,68,92,.04) !important;border-radius:8px;}
.row-urgent .crd-name{color:var(--red) !important;}
.row-urgent .meta{color:var(--red) !important;}
.row-urgent .meta svg{color:var(--red) !important;}
.row-urgent .prog{background:rgba(226,68,92,.15) !important;}
.row-urgent .mention{color:var(--red) !important;background:rgba(226,68,92,.1) !important;}
.ac-list{position:absolute;left:0;right:0;top:100%;margin-top:2px;background:var(--card);border:1.5px solid var(--border);border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.08);z-index:9999;max-height:160px;overflow-y:auto;}
.ac-item{padding:5px 10px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.ac-item:hover,.ac-item.sel{background:var(--hover);}
.ac-item .ac-av{width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Desktop overrides */
@media(min-width:600px){
  .ov{align-items:center;padding:16px;}
  .mod{border-radius:12px;padding:24px;padding-bottom:24px;max-height:92vh;box-shadow:0 16px 48px rgba(0,0,0,.12);}
  .rm{opacity:0;transition:opacity .15s;}
  .tr:hover .rm,.nr:hover .rm,.it:hover .rm,.row:hover .rm{opacity:1 !important;}
}
/* Mobile tweaks — Todoist-inspired */
@media(max-width:599px){
  .wrap{padding-left:12px;padding-right:12px;}
  .topbar h1{font-size:30px;margin-bottom:4px;}
  .quick{padding:14px 16px;margin-bottom:20px;}
  .quick input{font-size:16px;}

  /* Sections */
  .sec-hdr{margin-top:24px;margin-bottom:8px;}
  .sec-toggle{padding:8px 10px;font-size:16px;}

  /* Rows — more vertical breathing room + separator */
  .cards{gap:0;}
  .row{padding:14px 0;border-bottom:1px solid var(--border);border-radius:0 !important;align-items:flex-start;}
  .row:last-child{border-bottom:none;}
  .row:hover{background:transparent;border-radius:0 !important;}
  .row-urgent{border-radius:0 !important;}
  .done-anim{border-radius:0 !important;}

  /* Checkbox — keep square style */
  .chk{width:40px;min-height:44px;padding-top:2px;}
  .bx{width:22px;height:22px;}

  /* Card content */
  .crd{padding:0 4px 0 0;border-radius:0 !important;}
  .crd-name{font-size:15px;font-weight:400;line-height:1.45;}
  .crd-top{flex-wrap:wrap;gap:4px;}

  /* Meta below title */
  .meta{width:100%;order:1;margin-top:4px;font-size:12px;gap:8px;}

  /* Subtasks */

  /* Grip */
  .grip{opacity:1;min-height:48px;width:28px;font-size:18px;touch-action:none;-webkit-touch-callout:none;user-select:none;}

  /* Icons */
  .icon-btn{width:36px;height:36px;font-size:15px;}

  /* Hide desktop-only */
  .desktop-only{display:none !important;}

  /* Hide desktop quick add on mobile */
  .quick{display:none !important;}

  /* FAB — floating action button */
  .fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0));right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:28px;font-weight:300;cursor:pointer;box-shadow:0 4px 16px rgba(97,97,255,.35);z-index:900;display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;}
  .fab:active{transform:scale(.92);box-shadow:0 2px 8px rgba(97,97,255,.3);}
}
</style>

// ─── Search highlight: wraps matched text in <mark class="hl"> ───
function hlText(el,query){
  if(!query||!el)return;
  const q=query.toLowerCase();
  const walk=document.createTreeWalker(el,NodeFilter.SHOW_TEXT);
  const nodes=[];
  while(walk.nextNode())nodes.push(walk.currentNode);
  nodes.forEach(n=>{
    const txt=n.textContent;
    const idx=txt.toLowerCase().indexOf(q);
    if(idx<0)return;
    const before=txt.slice(0,idx);
    const match=txt.slice(idx,idx+query.length);
    const after=txt.slice(idx+query.length);
    const frag=document.createDocumentFragment();
    if(before)frag.append(document.createTextNode(before));
    const mark=document.createElement("mark");
    mark.className="hl";mark.textContent=match;
    frag.append(mark);
    if(after)frag.append(document.createTextNode(after));
    n.parentNode.replaceChild(frag,n);
  });
}
function noteExcerpt(noteHtml,query){

  const plain=tmp.textContent||tmp.innerText||"";
  const q=query.toLowerCase();
  const idx=plain.toLowerCase().indexOf(q);
  if(idx<0)return null;
  const start=Math.max(0,idx-30);
  const end=Math.min(plain.length,idx+query.length+40);
  let excerpt=(start>0?"…":"")+plain.slice(start,end)+(end<plain.length?"…":"");

}

// ─── Sync (Firebase Realtime Database) ───
const LS_KEY="taskr-data";
let lastKnownTs=0;// track last known cloud timestamp
async function sb(p){
  const prefs={
    dateSort:s._dateSort||null,
    calcArr:settings._calcArr||null,
    calcPauseStart:settings._calcPauseStart||null,
    calcPauseEnd:settings._calcPauseEnd||null,
    calcDep:settings._calcDep||null
  };
  const now=Date.now();
  // Transaction: only write if cloud hasn't been updated by another device since we last read
  const result=await dbRef.transaction(current=>{
    if(current&&current._ts&&current._ts>lastKnownTs&&lastKnownTs>0){
      // Cloud is newer than what we knew — don't overwrite
      return;// abort transaction
    }
    return{projects:p,_ts:now,_prefs:prefs};
  });
  if(!result.committed){
    // Transaction aborted — cloud was newer, reload
    slog("⚠","Conflit détecté — rechargement");
    const snap=await dbRef.once("value");
    const data=snap.val();
    if(data&&data.projects){s.p=data.projects;applyPrefs(data._prefs);lsSave();}
    lastKnownTs=data?._ts||now;
    qR();
    throw new Error("conflict");
  }
  lastKnownTs=now;
  // History backup (keep last 10)
  const histRef=db.ref("taskr_history");
  histRef.push({projects:p,_prefs:prefs,_ts:now,_date:new Date().toISOString()});
  // Trim to 10
  const histSnap=await histRef.orderByChild("_ts").once("value");
  const entries=[];
  histSnap.forEach(c=>{entries.push(c.key);});
  if(entries.length>10){
    const toDelete=entries.slice(0,entries.length-10);
    const updates={};
    toDelete.forEach(k=>{updates[k]=null;});
    await histRef.update(updates);
  }
}

  if(prefs.calcArr)settings._calcArr=prefs.calcArr;

  if(saving)return;

// ─── Tree helpers ───
function findInTree(id,nodes){
  for(const n of nodes){
    if(n.id===id)return n;
    if(n.children){const f=findInTree(id,n.children);if(f)return f;}
  }
  return null;
}
function findParentId(id,nodes,parentId){
  for(const n of nodes){
    if(n.id===id)return parentId;
    if(n.children){const f=findParentId(id,n.children,n.id);if(f)return f;}
  }
  return null;
}
function updateInTree(id,patch,nodes){
  return nodes.map(n=>{
    if(n.id===id)return{...n,...patch};
    if(n.children)return{...n,children:updateInTree(id,patch,n.children)};
    return n;
  });
}
function removeFromTree(id,nodes){
  return nodes.filter(n=>n.id!==id).map(n=>n.children?{...n,children:removeFromTree(id,n.children)}:n);
}

// up: update any task in tree — finds by id recursively
function up(id,patch,skipRender){
  // Check if top-level
  if(s.p.some(p=>p.id===id)){
    s.p=s.p.map(p=>p.id===id?{...p,...patch}:p);
  } else {
    // Nested — find root project and update tree
    s.p=s.p.map(p=>({...p,children:updateInTree(id,patch,p.children||[])}));
  }
  save();
  if(!skipRender) qR();
}

// ─── Cycle: To Do → In Progress → Done → To Do ───
const NEXT={"To Do":"In Progress","In Progress":"Done","Done":"To Do"};
const PREV={"In Progress":"To Do","Done":"In Progress","To Do":"Done"};
const TNEXT={"todo":"progress","progress":"done","done":"todo"};
const TPREV={"progress":"todo","done":"progress","todo":"done"};
const UNDO_MS=2000;
const lastTog={};

// ─── Haptic + Sound feedback ───
function haptic(){try{navigator.vibrate&&navigator.vibrate(15);}catch{}}
function playCheck(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(800,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200,ctx.currentTime+0.08);
    gain.gain.setValueAtTime(0.15,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.15);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+0.15);
  }catch{}
}

// Unified toggle — works for any task in tree
function tog(id,reverse){
  const t=findInTree(id,s.p);if(!t)return;
  const now=Date.now();
  const curSt=t.status||"To Do";
  // Quick re-click → undo
  if(lastTog[id]&&(now-lastTog[id].t)<UNDO_MS){
    const prev=lastTog[id].st;
    const patch={status:prev};
    if(prev==="Done"){patch.doneAt=td();if(t.children?.length)patch.children=t.children.map(c=>({...c,status:"Done",doneAt:c.doneAt||td()}));}
    else{patch.doneAt=null;if(t.children?.length)patch.children=t.children.map(c=>{const o={...c,status:"To Do"};delete o.doneAt;return o;});}
    delete lastTog[id];
    up(id,patch);return;
  }
  const next=reverse?(PREV[curSt]||"Done"):(NEXT[curSt]||"To Do");
  lastTog[id]={t:now,st:curSt};
  setTimeout(()=>{if(lastTog[id]&&(Date.now()-lastTog[id].t)>=UNDO_MS)delete lastTog[id];},UNDO_MS+50);
  const patch={status:next};
  const nowD=td();
  if(next==="Done"){patch.doneAt=nowD;if(t.children?.length)patch.children=t.children.map(c=>({...c,status:"Done",doneAt:c.doneAt||nowD}));}
  if(next==="To Do"){delete patch.doneAt;if(t.children?.length)patch.children=t.children.map(c=>{const o={...c,status:"To Do"};delete o.doneAt;return o;});}
  // Parent logic: if child starts working, set parent to In Progress
  const parentId=findParentId(id,s.p,null);
  if(parentId){
    const parent=findInTree(parentId,s.p);
    if(parent&&curSt==="To Do"&&parent.status==="To Do")up(parentId,{status:"In Progress"},true);
    if(parent&&curSt==="Done"&&next!=="Done"&&parent.status==="Done")up(parentId,{status:"In Progress",doneAt:null},true);
  }
  // Animate Done transition
  if(next==="Done"){
    haptic();playCheck();
    up(id,patch,true);
    const row=document.querySelector('[data-id="'+id+'"]');
    if(row){
      row.classList.add("done-anim");
      const bx=row.querySelector(".bx");
      if(bx){bx.classList.remove("ip");bx.classList.add("dn");bx.textContent="✓";}
      setTimeout(()=>{
        // Check if all siblings done → parent to Done
        if(parentId){
          const parent=findInTree(parentId,s.p);
          if(parent&&parent.children?.length&&parent.children.every(c=>c.status==="Done")&&parent.status!=="Done"){
            up(parentId,{status:"Done",doneAt:td()});
          }
        }
        qR();
      },1500);
    } else qR();
  } else {
    up(id,patch);
    // Check if all siblings done → parent to Done
    if(parentId){
      const parent=findInTree(parentId,s.p);
      if(parent&&parent.children?.length&&parent.children.every(c=>(c.id===id?next:c.status)==="Done")&&parent.status!=="Done"){
        up(parentId,{status:"Done",doneAt:td()});
      }
    }
  }
}

    noteDiv.dataset.ph="Notes, liens, idées…";
    // Auto-linkify plain URLs in text nodes
    function linkifyNote(el){
      const urlRe=/(https?:\/\/[^\s<]+)/g;
      const walker=document.createTreeWalker(el,NodeFilter.SHOW_TEXT);
      const nodes=[];
      while(walker.nextNode())nodes.push(walker.currentNode);
      nodes.forEach(node=>{
        if(node.parentElement.tagName==="A")return;
        const txt=node.textContent;
        if(!urlRe.test(txt))return;
        urlRe.lastIndex=0;
        const frag=document.createDocumentFragment();
        let last=0;
        for(const m of txt.matchAll(urlRe)){
          if(m.index>last)frag.append(document.createTextNode(txt.slice(last,m.index)));
          const a=document.createElement("a");
          a.href=m[0];a.textContent=m[0];a.target="_blank";a.rel="noopener";
          a.style.color="var(--accent)";a.style.textDecoration="underline";
          frag.append(a);
          last=m.index+m[0].length;
        }
        if(last<txt.length)frag.append(document.createTextNode(txt.slice(last)));
        node.parentNode.replaceChild(frag,node);
      });
    }

      let ovDown=false;

  }

  // ═══ COLLAPSED STATE ═══
  const c=h("div",{className:"crd",style:{cursor:isDone?"default":"pointer"}});
  c.oncontextmenu=e=>{e.preventDefault();s.sel.has(p.id)?s.sel.delete(p.id):s.sel.add(p.id);R();};
  if(!isDone){

  const effDt=effectiveDate(p);
  const db=dateBadge(effDt,!!(!p.due&&effDt));
  if(db&&!isDone)meta.append(db);
  top.append(meta);c.append(top);

  // Note excerpt when search matches note
  if(s.sq&&getNote(p)){
    const exc=noteExcerpt(getNote(p),s.sq);
    if(exc){
      const excDiv=h("div",{style:{fontSize:"12px",color:"var(--sec)",padding:"4px 0 2px 28px",lineHeight:"1.4",display:"flex",alignItems:"flex-start",gap:"4px"}});

}

    const endOfWeek=new Date(startOfWeek);endOfWeek.setDate(startOfWeek.getDate()+6);
    let weekLabel=startOfWeek.getDate()+" "+moisNoms[startOfWeek.getMonth()];
    if(startOfWeek.getMonth()!==endOfWeek.getMonth())weekLabel+=" — "+endOfWeek.getDate()+" "+moisNoms[endOfWeek.getMonth()];
    else weekLabel+=" — "+endOfWeek.getDate();
    if(startOfWeek.getFullYear()!==today.getFullYear())weekLabel+=" "+startOfWeek.getFullYear();
    calNav.append(navPrev,h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},h("span",{style:{fontSize:"15px",fontWeight:"700",color:"var(--dark)"}},weekLabel),navToday),navNext);
    w.append(calNav);

    // Collect tasks with dates (exclude Done)
    const allTasks=[];
    s.p.forEach(p=>{
      if(p.hidden||p.status==="Done")return;
      const eff=effectiveDate(p);
      if(eff)allTasks.push({name:p.name,due:eff,status:p.status,id:p.id,type:"project"});
      (p.children||[]).forEach((t,i)=>{
        if(t.due&&tSt(t)!=="done")allTasks.push({name:t.name,due:t.due,status:tSt(t),id:p.id,idx:i,type:"subtask",parentName:p.name});
      });
    });

    const jourNoms=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
    const todayStr=localIso(today);
    const weekStart=localIso(startOfWeek);
    const weekEndStr=localIso(endOfWeek);

    // ── Overdue banner ──
    const overdue=allTasks.filter(t=>t.due<todayStr&&t.due<weekStart);

      const odBanner=h("div",{style:{background:"rgba(226,68,92,.06)",borderRadius:"8px",padding:"8px 12px",marginBottom:"10px",borderLeft:"3px solid var(--red)"}});

      overdue.sort((a,b)=>a.due.localeCompare(b.due)).forEach(t=>{
        const el=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"3px 0",fontSize:"12px",color:"var(--red)",cursor:"pointer"}});
        const dot=h("div",{style:{width:"8px",height:"8px",borderRadius:"50%",background:t.status==="In Progress"?"var(--amber)":"var(--red)",flexShrink:"0",cursor:"pointer"}});
        dot.addEventListener("click",ev=>{ev.stopPropagation();tog(t.type==="subtask"?findInTree(t.id,s.p)?.children?.[t.idx]?.id||t.id:t.id);});

        el.addEventListener("mouseenter",()=>{el.style.background="rgba(226,68,92,.04)";});
        el.addEventListener("mouseleave",()=>{el.style.background="none";});
        odBanner.append(el);

    // ── Swipe container for mobile ──

    calBody.addEventListener("touchstart",e=>{swCalX=e.touches[0].clientX;},{passive:true});

      const dx=e.changedTouches[0].clientX-swCalX;swCalX=null;

      if(dx<-60){s._calWeekOffset++;R();}
      else if(dx>60){s._calWeekOffset--;R();}
    });

    for(let d=0;d<7;d++){
      const day=new Date(startOfWeek);day.setDate(startOfWeek.getDate()+d);
      const dayStr=localIso(day);

      const dayRow=h("div",{style:{borderBottom:d<6?"1px solid var(--border)":"none",padding:"10px 0",minHeight:"48px"}});

      const dayNum=h("div",{style:{width:"38px",height:"38px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",fontWeight:isToday?"700":"500",background:isToday?"var(--accent)":"transparent",color:isToday?"#fff":isWeekend?"var(--muted)":"var(--text)"}});
      dayNum.textContent=day.getDate();
      dayHdr.append(dayNum,h("span",{style:{fontSize:"12px",fontWeight:"600",color:isToday?"var(--accent)":isWeekend?"var(--muted)":"var(--sec)",textTransform:"uppercase"}},jourNoms[d]));
      dayRow.append(dayHdr);

      const dayTasks=allTasks.filter(t=>t.due===dayStr);
      if(dayTasks.length){

          const {urgent}=parseTask(t.name);
          const taskEl=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"4px 8px 4px 38px",fontSize:"13px",cursor:"pointer",borderRadius:"6px",transition:"background .12s",color:isDoneT?"var(--muted)":urgent?"var(--red)":"var(--text)",textDecoration:isDoneT?"line-through":"none"}});
          const dotColor=isDoneT?"var(--green)":t.status==="In Progress"||t.status==="progress"?"var(--amber)":"#0086C0";
          const dot=h("div",{style:{width:"10px",height:"10px",borderRadius:"50%",background:dotColor,flexShrink:"0",cursor:"pointer",transition:"transform .15s"}});
          dot.addEventListener("mouseenter",()=>{dot.style.transform="scale(1.4)";});
          dot.addEventListener("mouseleave",()=>{dot.style.transform="scale(1)";});
          dot.addEventListener("click",ev=>{
            ev.stopPropagation();
            // Find actual task id for subtasks
            if(t.type==="subtask"){
              const parent=findInTree(t.id,s.p);
              if(parent&&parent.children&&parent.children[t.idx])tog(parent.children[t.idx].id);
            } else tog(t.id);
          });
          taskEl.append(dot);
          const cleanName=t.name.replace(/@[\w\u00C0-\u024F]+\s*/g,"").replace(/!!/g,"").trim();
          taskEl.append(h("span",{style:{flex:"1",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},cleanName));
          if(t.type==="subtask")taskEl.append(h("span",{style:{fontSize:"10px",color:"var(--muted)",whiteSpace:"nowrap"}},t.parentName.replace(/@[\w\u00C0-\u024F]+\s*/g,"").replace(/!!/g,"").trim()));
          taskEl.addEventListener("click",()=>{
            if(isDoneT){toast("Repasse-la en cours pour l'éditer");return;}
            s.calView=false;s.ed=t.id;s.nk="";s.noteEdit=false;R();
          });
          taskEl.addEventListener("mouseenter",()=>{taskEl.style.background="var(--hover)";});
          taskEl.addEventListener("mouseleave",()=>{taskEl.style.background="none";});

        emptyBtn.addEventListener("mouseleave",()=>{emptyBtn.style.opacity=".5";emptyBtn.style.color="var(--muted)";});
        emptyBtn.addEventListener("click",()=>{
          s.calView=false;s._qiOpen=true;s._qiDate=dayStr;R();
        });
        dayRow.append(emptyBtn);
      }
      calBody.append(dayRow);
    }
    w.append(calBody);

    // Week summary
    const weekTasks=allTasks.filter(t=>t.due>=weekStart&&t.due<=weekEndStr);
    const weekDone=weekTasks.filter(t=>t.status==="Done"||t.status==="done").length;
    w.append(h("div",{style:{textAlign:"center",fontSize:"11px",color:"var(--muted)",padding:"16px 0 0"}},weekTasks.length+" tâche"+(weekTasks.length!==1?"s":"")+" cette semaine"+(weekDone?" · "+weekDone+" terminée"+(weekDone>1?"s":""):"")));

  } else {

    w.append(mkSec("En cours","#FDAB3D",ip.length));

  }

  }
  if(dn.length){
    w.append(mkSec("Terminé","#00C875",dn.length,true,s.doneOpen||!!s.sq,()=>{s.doneOpen=!s.doneOpen;R();}));
    // Always render done content (for search), hide if not open
    const doneWrap=h("div",{style:{display:s.doneOpen||s.sq?"block":"none"}});
    doneWrap.setAttribute("data-done-wrap","1");
    {
      // Group by day
      const groups={};
      dn.forEach(p=>{
        const day=p.doneAt?p.doneAt.slice(0,10):"Sans date";
        if(!groups[day])groups[day]=[];
        groups[day].push(p);
      });
      Object.entries(groups).forEach(([day,projects])=>{
        const dayGroup=h("div",{});
        dayGroup.setAttribute("data-done-group","1");
        const dayLabel=day==="Sans date"?"Sans date":shortDt(day);
        const dayHdr=h("div",{style:{fontSize:"10px",fontWeight:"600",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".04em",padding:"8px 0 2px",marginTop:"4px"}});
        dayHdr.textContent=dayLabel;
        dayGroup.append(dayHdr);
        const cards=h("div",{className:"cards"});
        projects.forEach(p=>cards.append(mkRow(p)));
        dayGroup.append(cards);
        doneWrap.append(dayGroup);
      });
    }
    w.append(doneWrap);
  }
  if(hid.length){
    const hidSec=h("div",{style:{marginTop:"24px",paddingTop:"12px",borderTop:"1px solid var(--border)"}});
    hidSec.append(h("button",{className:"btn-t",style:{fontSize:"11px",display:"flex",alignItems:"center",gap:"4px"},onClick:()=>{s.sh=!s.sh;R();}},
      h("span",{style:{transition:"transform .2s",display:"inline-block",transform:s.sh?"rotate(90deg)":"rotate(0)"}},"▶"),
      "Archivées ("+hid.length+")"
    ));
    if(s.sh){
      const cards=h("div",{className:"cards",style:{marginTop:"6px"}});
      hid.forEach(p=>{
        const row=h("div",{style:{display:"flex",alignItems:"center",padding:"8px",gap:"8px",opacity:".6"}});
        row.append(
          h("span",{style:{flex:"1",fontSize:"13px",color:"var(--muted)",textDecoration:"line-through"}},p.name),
          h("span",{style:{fontSize:"10px",color:"var(--muted)",fontFamily:"monospace"}},p.doneAt?shortDt(p.doneAt):""),
          h("button",{className:"btn-t",style:{fontSize:"12px",padding:"4px 8px"},title:"Restaurer",onClick:()=>up(p.id,{hidden:false})},"↩"),
          h("button",{className:"btn-t",style:{fontSize:"12px",padding:"4px 8px",color:"var(--red)"},title:"Supprimer",onClick:()=>{const backup=[...s.p];ps(s.p.filter(x=>x.id!==p.id));toast("Supprimé",()=>{ps(backup);});}},"🗑")
        );

      });

  }// end list view

  // Version footer
  const vf=h("div",{style:{textAlign:"center",padding:"24px 0 12px",fontSize:"10px",color:"var(--muted)",fontFamily:"monospace",opacity:".5",letterSpacing:".02em"}});
  vf.textContent="v2.2 · 30 mar 2026";
  w.append(vf);

  a.append(w);

  // Click outside expanded card or quick add → close
  if(s._outsideH){document.removeEventListener("mousedown",s._outsideH,true);s._outsideH=null;}
  if((s.ed||s.qed||s._qiOpen)&&!s.cm){
    const editId=s.ed||s.qed;
    s._outsideH=e=>{
      if(s.cm)return;
      if(e.target.closest&&e.target.closest(".flatpickr-calendar"))return;
      // Check quick add
      if(s._qiOpen&&e.target.closest&&e.target.closest(".quick"))return;
      // Check edit card
      if(editId){
        let el=e.target;
        while(el){
          if(el.getAttribute&&el.getAttribute("data-id")===editId)return;
          if(el.className&&typeof el.className==="string"&&(el.className.includes("cfm")||el.className.includes("ov")))return;
          el=el.parentElement;
        }
      }
      document.removeEventListener("mousedown",s._outsideH,true);s._outsideH=null;
      if(s._qiOpen&&!e.target.closest?.(".quick")){s._qiOpen=false;s.an="";s._qiDate=null;}
      s.ed=null;s.qed=null;s.noteEdit=false;R();
    };
    setTimeout(()=>document.addEventListener("mousedown",s._outsideH,true),50);
  }

  if(s.exp)rExp();
  if(s.keys)rKeys();
  if(s.sett)rSett();
  if(s.calc)rCalc();
  if(s.cm)rCfm();

  // Restore focus after render
  if(activeId){
    const el=document.getElementById(activeId);
    if(el){
      el.focus();
      if(typeof cursorPos==="number"&&el.setSelectionRange){
        try{el.setSelectionRange(cursorPos,cursorPos);}catch(e){}
      }
    }
  }
}

function rExp(){
  // Generate markdown from data
  function toMd(){
    let md="";
    const g={"In Progress":[],"To Do":[],"Done":[]};
    s.p.filter(p=>!p.hidden).forEach(p=>{if(g[p.status])g[p.status].push(p);});
    for(const[x,items]of Object.entries(g)){
      if(!items.length)continue;
      md+="## "+x+"\n\n";
      items.forEach(p=>{
        md+="### "+p.name+"\n";
        if(p.children?.length)p.children.forEach(t=>{
          md+="- ["+(tSt(t)==="done"?"x":tSt(t)==="progress"?"/":" ")+"] "+t.name+"\n";
        });
        const n=getNote(p);
        if(n)md+="\n"+n+"\n";
        md+="\n";
      });
    }
    return md.trim()+"\n";
  }
  // Parse markdown back to data
  function fromMd(md){
    const lines=md.split("\n");
    const projects=[];
    let curStatus=null,curProj=null,noteLines=[];
    function flushNote(){
      if(curProj&&noteLines.length){
        const txt=noteLines.join("\n").trim();
        if(txt)curProj.note=txt;
      }
      noteLines=[];
    }
    function flushProj(){
      flushNote();
      if(curProj)projects.push(curProj);
      curProj=null;
    }
    for(const line of lines){
      const statusM=line.match(/^## (In Progress|To Do|Done)/);
      if(statusM){flushProj();curStatus=statusM[1];continue;}
      const projM=line.match(/^### (.+)/);
      if(projM){
        flushProj();
        const existing=s.p.find(p=>p.name===projM[1].trim());
        curProj={id:existing?.id||gid(),name:projM[1].trim(),status:curStatus||"To Do",children:[],note:"",doneAt:existing?.doneAt||null,hidden:false};
        continue;
      }
      const taskM=line.match(/^- \[([ x\/])\] (.+)/);
      if(taskM&&curProj){
        flushNote();
        const st=taskM[1]==="x"?"done":taskM[1]==="/"?"progress":"todo";
        const STATUS_IMP={"done":"Done","progress":"In Progress","todo":"To Do"};
        const existingT=(s.p.find(p=>p.name===curProj.name)?.children||[]).find(t=>t.name===taskM[2].trim());
        curProj.children.push({id:existingT?.id||gid(),name:taskM[2].trim(),status:STATUS_IMP[st]||"To Do",note:"",children:[],doneAt:st==="done"?(existingT?.doneAt||td()):undefined});
        continue;
      }
      if(curProj&&line.trim()===""&&!noteLines.length)continue;
      if(curProj)noteLines.push(line);
    }
    flushProj();
    // Keep hidden projects
    const hidden=s.p.filter(p=>p.hidden);
    return [...projects,...hidden];
  }

  const mdVal=toMd();
  const ov=h("div",{className:"ov"});
  let ovDown=false;
  ov.addEventListener("mousedown",e=>{ovDown=(e.target===ov);});
  ov.addEventListener("mouseup",e=>{if(ovDown&&e.target===ov){s.exp=false;R();}ovDown=false;});
  ov.addEventListener("touchend",e=>{if(e.target===ov){s.exp=false;R();}});
  const m=h("div",{className:"mod",style:{maxWidth:"680px",display:"flex",flexDirection:"column",overflow:"hidden",height:"90vh"},onClick:e=>e.stopPropagation()});
  m.append(h("div",{className:"mod-hdr"},h("h3",{},"Markdown"),h("button",{className:"mod-x",onClick:()=>{s.exp=false;R();}},"✕")));

  const info=h("div",{style:{fontSize:"11px",color:"var(--muted)",marginBottom:"10px",lineHeight:"1.4",flexShrink:"0"}});
  info.textContent="Édite directement. Format : ## Statut / ### Projet / - [x] tâche done / - [/] en cours / - [ ] à faire";
  m.append(info);

  const ta=h("textarea",{id:"md-edit",style:{width:"100%",padding:"14px",borderRadius:"10px",border:"1.5px solid var(--border)",fontSize:"13px",fontFamily:"monospace",lineHeight:"1.6",color:"var(--text)",background:"var(--bg)",outline:"none",resize:"none",flex:"1",minHeight:"200px",overflowY:"auto",transition:"border-color .15s"}});
  ta.value=mdVal;
  ta.addEventListener("focus",()=>{ta.style.borderColor="var(--accent)";});
  ta.addEventListener("blur",()=>{ta.style.borderColor="var(--border)";});
  m.append(ta);

  const btns=h("div",{style:{display:"flex",gap:"8px",justifyContent:"flex-end",marginTop:"12px",flexShrink:"0"}});
  btns.append(
    h("button",{className:"btn btn-g",style:{fontSize:"12px"},onClick:()=>navigator.clipboard.writeText(ta.value)},"Copier"),
    h("button",{className:"btn btn-a",style:{fontSize:"12px"},onClick:()=>{
      const parsed=fromMd(ta.value);
      ps(parsed);
      s.exp=false;
    }},"Appliquer")
  );
  m.append(btns);
  ov.append(m);document.getElementById("app").append(ov);
}

function rSett(){
  const ov=h("div",{className:"ov"});
  ov.addEventListener("mousedown",e=>{ov._down=(e.target===ov);});
  ov.addEventListener("mouseup",e=>{if(ov._down&&e.target===ov){s.sett=false;R();}ov._down=false;});
  ov.addEventListener("touchend",e=>{if(e.target===ov){s.sett=false;R();}});
  const m=h("div",{className:"mod",style:{maxWidth:"400px"},onClick:e=>e.stopPropagation()});
  m.append(h("div",{className:"mod-hdr"},h("h3",{},"Réglages"),h("button",{className:"mod-x",onClick:()=>{s.sett=false;R();}},"✕")));

  // Toggle row helper
  function toggleRow(label,desc,key,def,badge){
    const row=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid var(--border)"}});
    const left=h("div",{});
    const titleRow=h("div",{style:{display:"flex",alignItems:"center",gap:"6px"}});
    titleRow.append(h("span",{style:{fontSize:"14px",fontWeight:"500",color:"var(--text)"}},label));
    if(badge)titleRow.append(h("span",{style:{fontSize:"9px",fontWeight:"700",color:"var(--accent)",background:"rgba(97,97,255,.1)",padding:"1px 6px",borderRadius:"8px",textTransform:"uppercase",letterSpacing:".04em"}},badge));
    left.append(titleRow);
    if(desc)left.append(h("div",{style:{fontSize:"11px",color:"var(--muted)",marginTop:"2px"}},desc));
    row.append(left);
    const val=settings[key]!=null?settings[key]:def;
    const toggle=h("div",{style:{width:"40px",height:"22px",borderRadius:"11px",background:val?"var(--accent)":"var(--border)",cursor:"pointer",transition:"background .2s",position:"relative",flexShrink:"0"}});
    const knob=h("div",{style:{width:"18px",height:"18px",borderRadius:"50%",background:"#fff",position:"absolute",top:"2px",left:val?"20px":"2px",transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.15)"}});
    toggle.append(knob);
    toggle.addEventListener("click",()=>{
      const nv=!((settings[key]!=null)?settings[key]:def);
      settings[key]=nv;saveSettings(settings);
      s.sett=true;R();
    });
    row.append(toggle);
    return row;
  }

  // Flatpickr — disabled, greyed out
  const fpRow=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid var(--border)",opacity:".4",pointerEvents:"none"}});
  const fpLeft=h("div",{});

  fpTitle.append(h("span",{style:{fontSize:"14px",fontWeight:"500",color:"var(--text)"}},"Flatpickr"));
  fpTitle.append(h("span",{style:{fontSize:"9px",fontWeight:"700",color:"var(--muted)",background:"rgba(0,0,0,.06)",padding:"1px 6px",borderRadius:"8px",textTransform:"uppercase",letterSpacing:".04em"}},"bientôt"));
  fpLeft.append(fpTitle);
  fpLeft.append(h("div",{style:{fontSize:"11px",color:"var(--muted)",marginTop:"2px"}},"Calendrier stylisé au lieu du natif"));

  const fpToggle=h("div",{style:{width:"40px",height:"22px",borderRadius:"11px",background:"var(--border)",position:"relative",flexShrink:"0"}});
  fpToggle.append(h("div",{style:{width:"18px",height:"18px",borderRadius:"50%",background:"#fff",position:"absolute",top:"2px",left:"2px",boxShadow:"0 1px 3px rgba(0,0,0,.15)"}}));
  fpRow.append(fpToggle);
  m.append(fpRow);
  m.append(toggleRow("Icône mention","Petit icône personne dans les tags","mentionIcon",true));
  m.append(toggleRow("Dates contrastées","Badges dates en blanc sur fond coloré","contrastDates",true));

  // Theme selector
  const thRow=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid var(--border)"}});
  const thLeft=h("div",{});
  thLeft.append(h("div",{style:{fontSize:"14px",fontWeight:"500",color:"var(--text)"}},"Thème"));
  thLeft.append(h("div",{style:{fontSize:"11px",color:"var(--muted)",marginTop:"2px"}},"Apparence de l'interface"));
  thRow.append(thLeft);
  const themes=[
    {key:"auto",label:"Auto"},
    {key:"light",label:"Light"},
    {key:"dark",label:"Dark"},
  ];
  const curTheme=settings.theme||"auto";
  const thBtns=h("div",{style:{display:"flex",gap:"4px",flexWrap:"wrap"}});
  themes.forEach(t=>{
    const active=curTheme===t.key;
    const b=h("button",{style:{
      padding:"4px 12px",borderRadius:"6px",fontSize:"11px",fontWeight:"600",cursor:"pointer",
      border:"1.5px solid "+(active?"var(--accent)":"var(--border)"),
      background:active?"var(--accent)":"transparent",color:active?"#fff":"var(--sec)",fontFamily:"inherit",transition:"all .15s"
    }});
    b.textContent=t.label;
    b.addEventListener("click",()=>{settings.theme=t.key;saveSettings(settings);s.sett=true;R();});
    thBtns.append(b);
  });
  thRow.append(thBtns);
  m.append(thRow);

  // Layout width selector
  const lwRow=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid var(--border)"}});
  const lwLeft=h("div",{});
  lwLeft.append(h("div",{style:{fontSize:"14px",fontWeight:"500",color:"var(--text)"}},"Largeur du contenu"));
  lwLeft.append(h("div",{style:{fontSize:"11px",color:"var(--muted)",marginTop:"2px"}},"Zone principale de la liste"));
  lwRow.append(lwLeft);
  const lwOpts=[{key:"normal",label:"Normal",w:"680px"},{key:"wide",label:"Large",w:"900px"}];
  const lwCur=settings.layoutWidth||"normal";
  const lwBtns=h("div",{style:{display:"flex",gap:"4px"}});
  lwOpts.forEach(o=>{
    const active=lwCur===o.key;
    const b=h("button",{style:{
      padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:"600",cursor:"pointer",border:"1.5px solid "+(active?"var(--accent)":"var(--border)"),
      background:active?"var(--accent)":"transparent",color:active?"#fff":"var(--sec)",fontFamily:"inherit",transition:"all .15s"
    }});
    b.textContent=o.label;
    b.addEventListener("click",()=>{settings.layoutWidth=o.key;saveSettings(settings);s.sett=true;R();});

function rCalc(){
  const ov=h("div",{className:"ov"});
  let ovDown=false;
  ov.addEventListener("mousedown",e=>{ovDown=(e.target===ov);});
  ov.addEventListener("mouseup",e=>{if(ovDown&&e.target===ov){s.calc=false;save();R();}ovDown=false;});
  ov.addEventListener("touchend",e=>{if(e.target===ov){s.calc=false;save();R();}});
  const m=h("div",{className:"mod",style:{maxWidth:"360px"},onClick:e=>e.stopPropagation()});
  m.append(h("div",{className:"mod-hdr"},h("h3",{},"Calculatrice horaire"),h("button",{className:"mod-x",onClick:()=>{s.calc=false;save();R();}},"✕")));

  const WORK=7*60+10;// 7h10 en minutes
  let arrival=settings._calcArr||"08:00";
  let pauseStart=settings._calcPauseStart||"12:00";
  let pauseEnd=settings._calcPauseEnd||"12:30";

  function calcPause(){
    const [sh,sm]=(pauseStart||"").split(":").map(Number);
    const [eh,em]=(pauseEnd||"").split(":").map(Number);
    if(isNaN(sh)||isNaN(sm)||isNaN(eh)||isNaN(em))return 30;
    const diff=(eh*60+em)-(sh*60+sm);
    return Math.max(30,diff);// minimum 30 min
  }

  let pause=calcPause();

  function calcEnd(arr,pau){
    const [hh,mm]=arr.split(":").map(Number);
    if(isNaN(hh)||isNaN(mm))return"--:--";
    const total=hh*60+mm+WORK+pau;
    const eh=Math.floor(total/60)%24;
    const em=total%60;
    return String(eh).padStart(2,"0")+":"+String(em).padStart(2,"0");
  }

  // Result display
  const resultTime=h("div",{style:{fontSize:"36px",fontWeight:"700",color:"var(--accent)",fontFamily:"monospace",letterSpacing:".02em"}},calcEnd(arrival,pause));
  const resultSub=h("div",{style:{fontSize:"11px",color:"var(--muted)",marginTop:"4px"}},"Journée de 7h10");
  const result=h("div",{style:{textAlign:"center",padding:"20px 0",background:"var(--hover)",borderRadius:"10px",marginBottom:"16px"}});
  result.append(
    h("div",{style:{fontSize:"11px",color:"var(--sec)",fontWeight:"600",textTransform:"uppercase",letterSpacing:".04em",marginBottom:"6px"}},"Heure de sortie"),
    resultTime,
    resultSub
  );
  m.append(result);

  let departure=settings._calcDep||"";

  function calcOvertime(){
    if(!departure)return null;
    const [ah,am]=arrival.split(":").map(Number);
    const [dh,dm]=departure.split(":").map(Number);
    if(isNaN(ah)||isNaN(am)||isNaN(dh)||isNaN(dm))return null;
    const worked=(dh*60+dm)-(ah*60+am)-pause;
    const diff=worked-WORK;
    const sign=diff>=0?"+":"−";
    const abs=Math.abs(diff);
    return{diff,label:sign+Math.floor(abs/60)+"h"+String(abs%60).padStart(2,"0")};
  }

  // Pause duration display
  const pauseInfo=h("span",{style:{fontSize:"11px",color:"var(--muted)",fontFamily:"monospace"}});
  function updatePauseInfo(){
    const raw=calcPause();
    const [sh,sm]=(pauseStart||"").split(":").map(Number);
    const [eh,em]=(pauseEnd||"").split(":").map(Number);
    const realDiff=(!isNaN(sh)&&!isNaN(sm)&&!isNaN(eh)&&!isNaN(em))?(eh*60+em)-(sh*60+sm):0;
    if(realDiff>0&&realDiff<30){
      pauseInfo.textContent="= 30 min (min.)";pauseInfo.style.color="var(--amber)";
    } else {
      pauseInfo.textContent="= "+raw+" min";pauseInfo.style.color="var(--muted)";
    }
  }

  function updateResult(){
    pause=calcPause();
    resultTime.textContent=calcEnd(arrival,pause);
    settings._calcArr=arrival;settings._calcPauseStart=pauseStart;settings._calcPauseEnd=pauseEnd;settings._calcDep=departure;saveSettings(settings);
    updatePauseInfo();
    // Overtime
    const ot=calcOvertime();
    if(ot){
      const color=ot.diff>=0?"var(--green)":"var(--red)";
      resultSub.innerHTML="";
      resultSub.style.marginTop="8px";
      resultSub.append(
        h("span",{style:{fontSize:"14px",fontWeight:"700",color,fontFamily:"monospace"}},ot.label),
        h("span",{style:{fontSize:"11px",color:"var(--muted)",marginLeft:"6px"}},"vs 7h10")
      );
    } else {
      resultSub.textContent="Journée de 7h10";
      resultSub.style.marginTop="4px";
    }
    if(depIn)depIn.style.color=departure?"var(--text)":"var(--muted)";
    // Update quick buttons active state
    qp.querySelectorAll("button").forEach(b=>{
      const min=parseInt(b.textContent);
      const active=min===pause;
      b.style.borderColor=active?"var(--accent)":"var(--border)";
      b.style.background=active?"var(--accent)":"transparent";
      b.style.color=active?"#fff":"var(--sec)";
    });
  }

  // Auto-formatting time input: 0910 → 09:10
  function timeInput(value,onChange){
    const input=h("input",{type:"text",value,placeholder:"--:--",inputMode:"numeric",style:{fontSize:"14px",padding:"6px 10px",border:"1.5px solid var(--border)",borderRadius:"8px",fontFamily:"monospace",color:"var(--text)",background:"var(--card)",outline:"none",textAlign:"center",width:"80px"}});
    input.addEventListener("focus",()=>{input.style.borderColor="var(--accent)";input.select();});
    input.addEventListener("blur",()=>{input.style.borderColor="var(--border)";if(input.value.length===5)onChange(input.value);});
    input.addEventListener("input",()=>{
      const pos=input.selectionStart;
      const raw=input.value.replace(/[^0-9]/g,"").slice(0,4);
      let formatted=raw;
      if(raw.length>=3)formatted=raw.slice(0,2)+":"+raw.slice(2);
      if(input.value!==formatted){
        input.value=formatted;
        // Adjust cursor: if we just inserted the ":", move cursor forward
        const newPos=pos+(formatted.length>raw.length&&pos>=2?1:0);
        input.setSelectionRange(newPos,newPos);
      }
      if(formatted.length===5)onChange(formatted);
    });
    return input;
  }

  // Arrival input
  const arrRow=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid var(--border)"}});
  arrRow.append(h("span",{style:{fontSize:"13px",color:"var(--text)",fontWeight:"500"}},"Arrivée"));
  const arrIn=timeInput(arrival,v=>{arrival=v;updateResult();});
  arrRow.append(arrIn);
  m.append(arrRow);

  // Pause midi — début + fin
  const pauseRow=h("div",{style:{padding:"10px 0",borderBottom:"1px solid var(--border)"}});
  const pauseLabel=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}});
  pauseLabel.append(h("span",{style:{fontSize:"13px",color:"var(--text)",fontWeight:"500"}},"Pause midi"));
  pauseLabel.append(pauseInfo);
  pauseRow.append(pauseLabel);
  const pauseTimes=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",justifyContent:"center"}});
  const psIn=timeInput(pauseStart,v=>{pauseStart=v;updateResult();});
  const peIn=timeInput(pauseEnd,v=>{pauseEnd=v;updateResult();});
  pauseTimes.append(psIn,h("span",{style:{color:"var(--muted)",fontSize:"13px"}},"→"),peIn);
  pauseRow.append(pauseTimes);
  m.append(pauseRow);

  // Quick pause buttons (set end time based on start + duration)
  const qp=h("div",{style:{display:"flex",gap:"6px",padding:"12px 0",justifyContent:"center"}});
  [30,45,60,90].forEach(min=>{
    const active=pause===min;
    const b=h("button",{style:{padding:"4px 12px",borderRadius:"6px",fontSize:"11px",fontWeight:"600",cursor:"pointer",border:"1.5px solid "+(active?"var(--accent)":"var(--border)"),background:active?"var(--accent)":"transparent",color:active?"#fff":"var(--sec)",fontFamily:"inherit",transition:"all .15s"}});
    b.textContent=min+"'";
    b.addEventListener("click",()=>{
      // Calculate end from start + duration
      const [sh,sm]=(pauseStart||"12:00").split(":").map(Number);
      if(!isNaN(sh)&&!isNaN(sm)){
        const total=sh*60+sm+min;
        const nh=Math.floor(total/60)%24;
        const nm=total%60;
        pauseEnd=String(nh).padStart(2,"0")+":"+String(nm).padStart(2,"0");
        peIn.value=pauseEnd;
      }
      updateResult();
    });
    qp.append(b);
  });
  m.append(qp);

  // Departure field (optional)
  const depRow=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderTop:"1px solid var(--border)"}});
  depRow.append(h("span",{style:{fontSize:"13px",color:"var(--text)",fontWeight:"500"}},"Départ réel"));
  const depWrap=h("div",{style:{display:"flex",alignItems:"center",gap:"6px"}});
  const depIn=timeInput(departure,v=>{departure=v;updateResult();});
  depWrap.append(depIn);
  if(departure){
    const clearBtn=h("button",{style:{background:"none",border:"none",fontSize:"14px",cursor:"pointer",color:"var(--muted)",padding:"2px 4px",lineHeight:"1"}});
    clearBtn.textContent="×";
    clearBtn.addEventListener("click",()=>{departure="";depIn.value="";updateResult();});
    depWrap.append(clearBtn);
  }
  depRow.append(depWrap);
  m.append(depRow);

  // Initial update
  updateResult();

  ov.append(m);document.getElementById("app").append(ov);
  requestAnimationFrame(()=>{arrIn.focus();arrIn.select();});
}

function rCfm(){
  const ov=document.createElement("div");
  ov.className="ov";
  ov.style.zIndex="2000";
  ov.style.alignItems="center";
  ov.style.padding="16px";
  // Block ALL events from reaching layers below
  ov.addEventListener("click",e=>{e.stopPropagation();e.preventDefault();xcfm();});
  ov.addEventListener("touchend",e=>{e.stopPropagation();});
  const box=h("div",{className:"cfm"});
  box.addEventListener("click",e=>e.stopPropagation());
  box.addEventListener("touchend",e=>e.stopPropagation());
  box.append(
    h("p",{},s.cm),
    h("div",{style:{display:"flex",gap:"12px",justifyContent:"center"}},
      h("button",{className:"btn btn-g",style:{padding:"12px 28px",fontSize:"14px",minHeight:"48px"},onClick:e=>{e.stopPropagation();xcfm();}},"Annuler"),
      h("button",{className:"btn btn-r",style:{padding:"12px 28px",fontSize:"14px",minHeight:"48px"},onClick:e=>{e.stopPropagation();s.cf?.();xcfm();}},"Confirmer")
    )
  );
  ov.append(box);
  document.getElementById("app").append(ov);
}
