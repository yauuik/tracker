  {id:"p1",name:"Template Jira — Quiz Ciblage v2",status:"In Progress",tasks:[{text:"Ajouter les questions MC labels",st:"todo"},{text:"Questions recurring journeys",st:"todo"},{text:"Valider 5 nouvelles questions v2",st:"done"}],notes:[{date:"2025-12",text:"5 questions validées (v2)"},{date:"2025-11",text:"Structure 2 parties"}]},

// ─── Team (mentions @) ───
const TEAM=["Larissa","Bryan","Véro","Stefan","Caroline","Joan","Aurélie","Fleur","Caro","Alex"];

// ─── State ───
let s={p:[],ok:false,sy:"loading",ed:null,exp:false,keys:false,cm:null,cf:null,nk:"",an:"",sel:new Set(),doneOpen:false,sh:false,noteEdit:false};
let svT=null;
const syncLogs=[];
function slog(type,msg){
  const now=new Date();
  const ts=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0")+":"+String(now.getSeconds()).padStart(2,"0");

// ─── Drag & Drop (To Do only) — custom mouse-based ───
let dragId=null,lastDragOver=null,dragClone=null,dragStartY=0,dragRowH=0;
function reorder(fromId,toId,above){
  if(!fromId||!toId||fromId===toId)return;
  const arr=[...s.p];
  const fi=arr.findIndex(p=>p.id===fromId);
  let ti=arr.findIndex(p=>p.id===toId);
  if(fi<0||ti<0)return;
  const [item]=arr.splice(fi,1);
  // After removal, adjust target index
  if(fi<ti)ti--;
  if(!above)ti++;
  arr.splice(ti,0,item);
  ps(arr);
}

let touchDragEl=null,touchClone=null,touchCurId=null;

function clearDropLines(){document.querySelectorAll(".drop-line.active").forEach(d=>d.classList.remove("active"));}
function findDropTarget(y){
  const rows=document.querySelectorAll('.row[data-id]');
  let best=null,bestDist=Infinity;
  rows.forEach(r=>{
    if(r.getAttribute("data-id")===dragId)return;
    const rc=r.getBoundingClientRect();
    const mid=rc.top+rc.height/2;
    const dist=Math.abs(y-mid);
    if(dist<bestDist){bestDist=dist;best={el:r,id:r.getAttribute("data-id"),above:y<mid};}
  });
  return best;
}
function onDragMove(e){
  if(!dragClone)return;
  e.preventDefault();
  const y=(e.clientY||e.touches?.[0]?.clientY||0);
  dragClone.style.top=(y-dragRowH/2)+"px";
  const t=findDropTarget(y);
  if(!t)return;
  const key=t.id+(t.above?"a":"b");
  if(lastDragOver===key)return;
  lastDragOver=key;
  clearDropLines();
  // Find or create drop-line before/after target
  const lineId="dl-"+t.id+(t.above?"-a":"-b");
  let line=document.getElementById(lineId);
  if(!line){
    line=document.createElement("div");
    line.className="drop-line";line.id=lineId;
    if(t.above)t.el.parentElement.insertBefore(line,t.el);
    else t.el.parentElement.insertBefore(line,t.el.nextSibling);
  }
  requestAnimationFrame(()=>line.classList.add("active"));
}
function onDragEnd(){
  if(!dragClone)return;
  document.removeEventListener("mousemove",onDragMove);
  document.removeEventListener("mouseup",onDragEnd);
  document.removeEventListener("touchmove",onDragMove);
  document.removeEventListener("touchend",onDragEnd);
  document.removeEventListener("touchcancel",onDragEnd);
  dragClone.remove();dragClone=null;
  // Find active drop line to determine target
  const active=document.querySelector(".drop-line.active");
  if(active){
    const lineId=active.id;// dl-{id}-a or dl-{id}-b
    const suffix=lineId.slice(-1);// 'a' or 'b'
    const targetId=lineId.slice(3,-2);// remove 'dl-' and '-a'/'-b'
    if(targetId&&targetId!==dragId)reorder(dragId,targetId,suffix==="a");
  }
  dragId=null;lastDragOver=null;
  document.querySelectorAll(".drop-line").forEach(d=>d.remove());
  document.querySelectorAll(".row.dragging").forEach(r=>r.classList.remove("dragging"));
  document.body.style.userSelect="";
  R();
}

const gid=()=>"p"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const td=()=>new Date().toISOString().slice(0,10);
function shortDt(d){if(!d)return"";const dt=new Date(d);const m=["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];return dt.getDate()+" "+m[dt.getMonth()];}
// Render text with clickable links and line breaks
// Parse task text: extract @mentions (to front) and !!! (urgent flag)
const NAME_RE=/@([\w\u00C0-\u024F]+)/g;
function parseTask(txt){
  const mentions=[];
  let m;
  const re=new RegExp(NAME_RE.source,"g");
  while((m=re.exec(txt))!==null){
    const name=m[1];
    const match=TEAM.find(t=>t.toLowerCase()===name.toLowerCase());
    if(match&&!mentions.includes(match))mentions.push(match);
  }
  const urgent=txt.includes("!!!");
  let clean=txt.replace(new RegExp(NAME_RE.source,"g"),(full,name)=>{
    return TEAM.some(t=>t.toLowerCase()===name.toLowerCase())?"":full;
  }).replace(/!!!/g,"").replace(/\s{2,}/g," ").trim();
  return {mentions,urgent,clean};
}

// Render task content: mention tags first, then clean text with links
function richTask(txt,style){
  const {mentions,urgent,clean}=parseTask(txt);
  const sp=h("span",{style:style||{}});
  mentions.forEach(name=>{
    sp.append(h("span",{className:"mention"},name));
    sp.append(document.createTextNode(" "));
  });
  const urlRe=/(https?:\/\/[^\s]+)/g;
  const lines=clean.split("\n");
  lines.forEach((line,li)=>{
    let last=0;
    for(const m of line.matchAll(urlRe)){
      if(m.index>last)sp.append(document.createTextNode(line.slice(last,m.index)));
      const a=h("a",{href:m[0],style:{color:"var(--accent)",textDecoration:"underline",wordBreak:"break-all"}});
      a.textContent=m[0].length>50?m[0].slice(0,47)+"…":m[0];
      a.target="_blank";a.rel="noopener";
      a.addEventListener("click",e=>e.stopPropagation());
      sp.append(a);
      last=m.index+m[0].length;
    }
    if(last<line.length)sp.append(document.createTextNode(line.slice(last)));
    if(li<lines.length-1)sp.append(document.createElement("br"));
  });
  return sp;
}

// richText for notes/names (keeps @inline, no extraction)
function richText(txt,style){
  const sp=h("span",{style:style||{}});
  const tokenRe=/(https?:\/\/[^\s]+)|(@[\w\u00C0-\u024F]+)/g;
  const lines=txt.split("\n");
  lines.forEach((line,li)=>{
    let last=0;
    for(const m of line.matchAll(tokenRe)){
      if(m.index>last)sp.append(document.createTextNode(line.slice(last,m.index)));
      if(m[1]){
        const a=h("a",{href:m[1],style:{color:"var(--accent)",textDecoration:"underline",wordBreak:"break-all"}});
        a.textContent=m[1].length>50?m[1].slice(0,47)+"…":m[1];
        a.target="_blank";a.rel="noopener";
        a.addEventListener("click",e=>e.stopPropagation());
        sp.append(a);
      } else if(m[2]){
        const name=m[2].slice(1);
        if(TEAM.some(t=>t.toLowerCase()===name.toLowerCase())){
          sp.append(h("span",{className:"mention"},TEAM.find(t=>t.toLowerCase()===name.toLowerCase())));
        } else {
          sp.append(document.createTextNode(m[2]));
        }
      }
      last=m.index+m[0].length;
    }
    if(last<line.length)sp.append(document.createTextNode(line.slice(last)));
    if(li<lines.length-1)sp.append(document.createElement("br"));
  });
  return sp;
}

let acList=null,acOpen2=false,acIdx2=0,acFiltered2=[],acInput=null;

// Extract @mentions from text, return {tags:[], clean:""}
function extractTags(txt){
  const tags=[];
  const re=new RegExp(NAME_RE.source,"g");
  let m;
  while((m=re.exec(txt))!==null){
    const match=TEAM.find(t=>t.toLowerCase()===m[1].toLowerCase());
    if(match&&!tags.includes(match))tags.push(match);
  }
  let clean=txt;
  tags.forEach(t=>{clean=clean.replace(new RegExp("@"+t+"\\s*","gi"),"");});
  clean=clean.replace(/\s{2,}/g," ").trim();
  return {tags,clean};
}

// Rebuild full value from tags + text
function buildVal(tags,text){
  let v=tags.map(t=>"@"+t).join(" ");
  if(v&&text)v+=" ";

}

function acShow(q,wrap){
  acFiltered2=TEAM.filter(t=>t.toLowerCase().startsWith(q.toLowerCase()));
  if(!acFiltered2.length){acClose();return;}
  acOpen2=true;acIdx2=0;
  if(acList)acList.remove();
  acList=document.createElement("div");
  acList.className="ac-list open";
  acFiltered2.forEach((name,i)=>{
    const it=h("div",{className:"ac-item"+(i===0?" sel":"")});
    it.append(h("div",{className:"ac-av"},name[0].toUpperCase()),h("span",{},name));
    const pick=e=>{e.preventDefault();e.stopPropagation();wrap._pick(name);};
    it.addEventListener("mousedown",pick);
    it.addEventListener("touchend",pick);
    acList.append(it);
  });
  wrap.append(acList);
}

function acCheck(input,wrap){
  const v=input.value;
  const cur=input.selectionStart!=null?input.selectionStart:v.length;
  const before=v.slice(0,cur);
  const atIdx=before.lastIndexOf("@");
  if(atIdx>=0&&(atIdx===0||before[atIdx-1]===" ")){
    const q=before.slice(atIdx+1);
    if(q.length>=0&&!/\s/.test(q)){acInput=input;acShow(q,wrap);return;}
  }
  acClose();
}

// mentionField: input + chip bar above it
// opts: {value, placeholder, onInput, onEnter, style, focusEnd, inputStyle}
function mentionField(opts){
  const wrap=h("div",{style:{flex:"1",position:"relative"}});
  const {tags:initTags,clean:initClean}=extractTags(opts.value||"");
  let tags=[...initTags];

  // Tag bar
  const bar=h("div",{style:{display:"flex",flexWrap:"wrap",gap:"4px",padding:tags.length?"0 0 4px":"0"}});
  function renderBar(){
    bar.innerHTML="";
    bar.style.padding=tags.length?"0 0 4px":"0";
    tags.forEach((name,i)=>{
      const chip=h("span",{className:"mention",style:{cursor:"pointer",fontSize:"12px"}},name);
      chip.addEventListener("click",e=>{e.stopPropagation();tags.splice(i,1);renderBar();fire();});
      bar.append(chip);
    });
  }
  renderBar();

  // Input
  const input=h("input",{value:initClean,placeholder:opts.placeholder||"",style:{
    width:"100%",border:"none",outline:"none",fontFamily:"inherit",color:"var(--text)",background:"transparent",padding:"0",margin:"0",fontSize:"14px",
    ...(opts.inputStyle||opts.style||{})
  }});

  function fire(){if(opts.onInput)opts.onInput(buildVal(tags,input.value.trim()));}

  wrap._pick=function(name){
    if(!tags.includes(name))tags.push(name);
    // Remove @query from input
    const v=input.value;
    const cur=input.selectionStart!=null?input.selectionStart:v.length;
    const before=v.slice(0,cur);
    const atIdx=before.lastIndexOf("@");
    if(atIdx>=0){
      input.value=v.slice(0,atIdx)+v.slice(cur);
    }
    renderBar();fire();acClose();
    input.focus();
  };

  input.addEventListener("input",()=>{fire();acCheck(input,wrap);});
  input.addEventListener("keyup",()=>acCheck(input,wrap));
  input.addEventListener("keydown",e=>{
    if(acOpen2){
      if(e.key==="ArrowDown"){e.preventDefault();acIdx2=Math.min(acIdx2+1,acFiltered2.length-1);if(acList)acList.querySelectorAll(".ac-item").forEach((it,i)=>it.classList.toggle("sel",i===acIdx2));}
      else if(e.key==="ArrowUp"){e.preventDefault();acIdx2=Math.max(acIdx2-1,0);if(acList)acList.querySelectorAll(".ac-item").forEach((it,i)=>it.classList.toggle("sel",i===acIdx2));}
      else if(e.key==="Enter"&&acFiltered2[acIdx2]){e.preventDefault();e.stopImmediatePropagation();wrap._pick(acFiltered2[acIdx2]);return;}
      else if(e.key==="Escape"){e.preventDefault();acClose();return;}
    }
    // Backspace on empty input → remove last tag
    if(e.key==="Backspace"&&input.value===""&&tags.length){
      e.preventDefault();tags.pop();renderBar();fire();return;
    }
    if(e.key==="Enter"&&!acOpen2&&opts.onEnter){e.preventDefault();opts.onEnter();}
  });
  input.addEventListener("blur",()=>setTimeout(acClose,200));

  wrap.append(bar,input);
  if(opts.focusEnd)requestAnimationFrame(()=>{input.focus();input.selectionStart=input.selectionEnd=input.value.length;});

  wrap._input=input;
  wrap._getTags=()=>tags;
  return wrap;
}
function tSt(t){return t.st||(t.done?"done":"todo");}
// Backward compat: convert old notes array to single string
function getNote(p){
  if(typeof p.note==="string")return p.note;
  if(Array.isArray(p.notes)&&p.notes.length)return p.notes.map(n=>n.text).join("\n");
  return "";
}

// ─── Cycle: To Do → In Progress → Done → To Do ───
const NEXT={"To Do":"In Progress","In Progress":"Done","Done":"To Do"};
const PREV={"In Progress":"To Do","Done":"In Progress","To Do":"Done"};
const TNEXT={"todo":"progress","progress":"done","done":"todo"};
const TPREV={"progress":"todo","done":"progress","todo":"done"};
const UNDO_MS=2000;
const lastTogP={};
const lastTogT={};

function togP(id){
  const p=s.p.find(x=>x.id===id);if(!p)return;
  const now=Date.now();
  // Quick re-click → undo
  if(lastTogP[id]&&(now-lastTogP[id].t)<UNDO_MS){
    const prev=lastTogP[id].st;
    const patch={status:prev};
    if(prev==="Done"){patch.doneAt=td();patch.tasks=(p.tasks||[]).map(t=>({...t,st:"done",doneAt:t.doneAt||td()}));}
    else{patch.doneAt=null;patch.tasks=(p.tasks||[]).map(t=>{const o={...t,st:"todo"};delete o.doneAt;return o;});}
    delete lastTogP[id];
    up(id,patch);return;
  }
  const next=NEXT[p.status]||"To Do";
  lastTogP[id]={t:now,st:p.status};
  setTimeout(()=>{if(lastTogP[id]&&(Date.now()-lastTogP[id].t)>=UNDO_MS)delete lastTogP[id];},UNDO_MS+50);
  const patch={status:next};
  const nowD=td();
  if(next==="Done"){patch.doneAt=nowD;patch.tasks=(p.tasks||[]).map(t=>({...t,st:"done",doneAt:t.doneAt||nowD}));}
  if(next==="To Do"){delete patch.doneAt;patch.tasks=(p.tasks||[]).map(t=>{const o={...t,st:"todo"};delete o.doneAt;return o;});}
  up(id,patch);
}

function togT(pid,i){
  const p=s.p.find(x=>x.id===pid);if(!p)return;
  const t=(p.tasks||[])[i];if(!t)return;
  const now=Date.now();
  const tk=pid+"-"+i;
  // Quick re-click → undo
  if(lastTogT[tk]&&(now-lastTogT[tk].t)<UNDO_MS){
    const ts=[...(p.tasks||[])];
    const prev=lastTogT[tk].st;
    const nt={...t,st:prev};
    if(prev==="done")nt.doneAt=td();else delete nt.doneAt;
    ts[i]=nt;
    delete lastTogT[tk];
    up(pid,{tasks:ts});return;
  }
  lastTogT[tk]={t:now,st:tSt(t)};
  setTimeout(()=>{if(lastTogT[tk]&&(Date.now()-lastTogT[tk].t)>=UNDO_MS)delete lastTogT[tk];},UNDO_MS+50);
  const ts=[...(p.tasks||[])];
  const nst=TNEXT[tSt(t)]||"todo";
  const nt={...t,st:nst};
  if(nst==="done") nt.doneAt=td();
  else delete nt.doneAt;
  ts[i]=nt;
  const patch={tasks:ts};
  if(tSt(t)==="todo"&&p.status==="To Do") patch.status="In Progress";
  if(tSt(t)==="done"&&nst!=="done"&&p.status==="Done"){patch.status="In Progress";patch.doneAt=null;}
  up(pid,patch,true);
  const cur=s.p.find(x=>x.id===pid);
  if(cur&&cur.tasks&&cur.tasks.length&&cur.tasks.every(t2=>tSt(t2)==="done")&&cur.status!=="Done"){
    up(pid,{status:"Done",doneAt:td()});
  } else {
    R();
  }
}

function qadd(){
  if(!s.an.trim())return;
  const n={id:gid(),name:s.an.trim(),status:"To Do",tasks:[],note:""};
  ps([n,...s.p]);
  s.an="";s.nk="";
}
function atk(){if(!s.nk.trim()||!s.ed)return;const p=s.p.find(x=>x.id===s.ed);up(s.ed,{tasks:[...(p.tasks||[]),{text:s.nk.trim(),st:"todo",date:td()}]});s.nk="";}
function cfm(m,f){s.cm=m;s.cf=f;R();}
function xcfm(){s.cm=null;s.cf=null;R();}

function onK(e){
  const ii=["INPUT","TEXTAREA","SELECT"].includes(document.activeElement?.tagName);
  if(e.key==="Escape"){if(s.cm)xcfm();else if(s.ed){s.ed=null;s.noteEdit=false;}else if(s.exp){s.exp=false;}else if(s.keys){s.keys=false;}else if(s.sel.size)s.sel.clear();e.preventDefault();R();return;}
  if(e.key==="Enter"){if(s.cm){e.preventDefault();s.cf?.();xcfm();return;}if(s.keys||s.exp){e.preventDefault();s.keys=false;s.exp=false;R();return;}if(s.ed&&!ii){e.preventDefault();s.ed=null;R();return;}}
  if(!ii&&!s.ed&&!s.exp&&!s.keys){
    if(e.key==="n"){e.preventDefault();document.querySelector(".quick .ce-field")?.focus();return;}
    if(e.key==="e"){e.preventDefault();s.exp=true;R();}
    if(e.key==="?"){e.preventDefault();s.keys=!s.keys;R();}
  }
  if(s.ed&&!ii){
    if(e.key==="t"){e.preventDefault();document.getElementById("ti")?.focus();}
    if(e.key==="n"){e.preventDefault();document.getElementById("ni")?.focus();}
    if(e.key==="1")up(s.ed,{status:"To Do",doneAt:null});if(e.key==="2")up(s.ed,{status:"In Progress",doneAt:null});if(e.key==="3")up(s.ed,{status:"Done",doneAt:td()});
  }
}

// ─── Rendering helpers ───
function h(t,p,...k){const e=document.createElement(t);if(p)Object.entries(p).forEach(([a,v])=>{if(a==="style"&&typeof v==="object")Object.assign(e.style,v);else if(a.startsWith("on"))e.addEventListener(a.slice(2).toLowerCase(),v);else if(a==="className")e.className=v;else e.setAttribute(a,v);});k.flat(9).forEach(c=>{if(c!=null)e.append(typeof c==="string"?document.createTextNode(c):c);});return e;}

function bxCls(st){return st==="done"?"bx dn":st==="progress"?"bx ip":"bx";}

function mkRow(p){
  const ts=p.tasks||[];
  const dc=ts.filter(t=>tSt(t)==="done").length;
  const pSt=p.status==="Done"?"done":p.status==="In Progress"?"progress":"todo";
  const isDone=p.status==="Done";
  const isTodo=p.status==="To Do";
  const isOpen=s.ed===p.id;
  const row=h("div",{className:"row"});
  row.setAttribute("data-id",p.id);

  // Drag & Drop — To Do only, collapsed only — custom mouse/touch
  if(isTodo&&!isOpen){
    row.style.cursor="grab";
    let pendingDrag=null;
    const startDrag=(startY)=>{
      dragId=p.id;lastDragOver=null;
      window.getSelection()?.removeAllRanges();
      const rect=row.getBoundingClientRect();
      dragRowH=rect.height;
      dragClone=row.cloneNode(true);
      dragClone.className="row drag-clone";
      dragClone.style.top=rect.top+"px";
      dragClone.style.left=rect.left+"px";
      dragClone.style.width=rect.width+"px";
      document.body.append(dragClone);
      row.classList.add("dragging");
      document.body.style.userSelect="none";
      document.addEventListener("mousemove",onDragMove);
      document.addEventListener("mouseup",onDragEnd);
      document.addEventListener("touchmove",onDragMove,{passive:false});
      document.addEventListener("touchend",onDragEnd);
      document.addEventListener("touchcancel",onDragEnd);
    };
    // Desktop: drag from anywhere on the row (click vs drag threshold)
    row.addEventListener("mousedown",e=>{
      if(e.button!==0)return;
      if(e.target.closest(".chk,.bx,.bx-s,.rm,.btn-t"))return;
      e.preventDefault();
      const startY=e.clientY;const startX=e.clientX;
      pendingDrag={startY,startX,started:false};
      document.body.style.userSelect="none";
      document.body.style.webkitUserSelect="none";
      const onMove2=ev=>{
        if(!pendingDrag)return;
        ev.preventDefault();
        const dx=ev.clientX-startX,dy=ev.clientY-startY;
        if(Math.abs(dx)+Math.abs(dy)>5&&!pendingDrag.started){
          pendingDrag.started=true;
          startDrag(startY);
        }
      };
      const onUp2=()=>{
        document.removeEventListener("mousemove",onMove2);
        document.removeEventListener("mouseup",onUp2);
        document.body.style.userSelect="";
        document.body.style.webkitUserSelect="";
        window.getSelection()?.removeAllRanges();
        if(pendingDrag&&!pendingDrag.started){
          s.ed=p.id;s.nk="";s.noteEdit=false;R();
        }
        pendingDrag=null;
      };
      document.addEventListener("mousemove",onMove2);
      document.addEventListener("mouseup",onUp2);
    });
    // Grip handle
    const grip=h("div",{className:"grip"});
    grip.textContent="⠿";
    // Mobile: long-press on grip to drag
    let longPressT=null;
    grip.addEventListener("touchstart",e=>{
      e.stopPropagation();
      const y=e.touches[0].clientY;
      longPressT=setTimeout(()=>{
        longPressT=null;
        if(navigator.vibrate)navigator.vibrate(30);
        startDrag(y);
      },250);
    },{passive:true});
    grip.addEventListener("touchmove",()=>{if(longPressT){clearTimeout(longPressT);longPressT=null;}});
    grip.addEventListener("touchend",()=>{if(longPressT){clearTimeout(longPressT);longPressT=null;}});
    grip.addEventListener("touchcancel",()=>{if(longPressT){clearTimeout(longPressT);longPressT=null;}});
    row.append(grip);
  }

  // Checkbox
  row.append(h("div",{className:"chk",onClick:e=>{e.stopPropagation();togP(p.id);}},
    h("div",{className:bxCls(pSt)},bxTxt(pSt))));

  // ═══ EXPANDED STATE ═══
  if(isOpen){
    const c=h("div",{className:"crd crd-open",style:{background:"var(--card)"}});
    c.oncontextmenu=e=>{e.preventDefault();s.sel.has(p.id)?s.sel.delete(p.id):s.sel.add(p.id);R();};

    // Same top row as collapsed — name is editable input with @mention
    const top=h("div",{className:"crd-top"});
    const nameWrap=mentionField({
      value:p.name,
      style:{fontSize:"15px",fontWeight:"500",background:"transparent",padding:"0"},
      onInput:v=>up(p.id,{name:v},true),
      onEnter:()=>{s.ed=null;s.noteEdit=false;R();},
      focusEnd:true
    });
    top.append(nameWrap);
    const meta=h("div",{className:"meta"});
    if(ts.length){
      const pg=h("div",{className:"prog"});
      pg.append(h("div",{className:"prog-f",style:{width:(dc/ts.length*100)+"%",background:dc===ts.length?"var(--green)":"var(--amber)"}}));
      meta.append(pg,h("span",{},dc+"/"+ts.length));
    }
    if(isDone&&p.doneAt)meta.append(h("span",{style:{color:"var(--green)",fontSize:"10px",fontFamily:"monospace"}},"✓ "+shortDt(p.doneAt)));
    top.append(meta);
    c.append(top);

    // Same subtasks as collapsed
    if(ts.length){
      const itd=h("div",{className:"itasks"});
      ts.forEach((t,i)=>{
        const st=tSt(t);
        const {urgent}=parseTask(t.text);
        const it=h("div",{className:"it"+(urgent?" urgent":"")});
        const tspan=richTask(t.text,{flex:"1"});
        if(st==="done")tspan.classList.add("x");
        it.append(
          h("div",{className:bxsCls(st),onClick:e=>{e.stopPropagation();togT(p.id,i);}},bxsTxt(st)),
          tspan
        );
        if(st==="done"&&t.doneAt)it.append(h("span",{style:{fontSize:"10px",color:"var(--muted)",fontFamily:"monospace",whiteSpace:"nowrap",paddingLeft:"6px"}},shortDt(t.doneAt)));
        // Delete button per task
        it.append(h("button",{className:"rm",style:{fontSize:"12px",padding:"1px 4px"},onClick:e=>{e.stopPropagation();const x=[...ts];x.splice(i,1);up(p.id,{tasks:x});}},"×"));
        itd.append(it);
      });
      c.append(itd);
    }

    // ─── Edit panel below ───
    const panel=h("div",{style:{marginTop:"8px",paddingTop:"8px",borderTop:"1px solid var(--border)",position:"relative",zIndex:"50",overflow:"visible"}});

    // Add task input
    const tir=h("div",{style:{display:"flex",gap:"6px",marginBottom:"4px",position:"relative",zIndex:"60",overflow:"visible"}});
    tir.append(mentionField({
      value:s.nk,
      placeholder:"+ Ajouter une tâche…",
      style:{fontSize:"13px",padding:"5px 8px",border:"1.5px solid var(--border)",borderRadius:"6px",background:"var(--card)"},
      onInput:v=>{s.nk=v;},
      onEnter:atk
    }));
    panel.append(tir);

    // Notes
    const noteVal=getNote(p);
    if(noteVal&&!s.noteEdit){
      const preview=h("div",{style:{padding:"6px 8px",borderRadius:"6px",border:"1px dashed var(--border)",fontSize:"12px",lineHeight:"1.5",cursor:"text",color:"var(--sec)",wordBreak:"break-word",marginTop:"6px"}});
      preview.append(richText(noteVal,{}));
      preview.addEventListener("click",e=>{if(e.target.tagName==="A")return;s.noteEdit=true;R();});
      panel.append(preview);
    } else if(!noteVal&&!s.noteEdit){
      const ph=h("div",{style:{padding:"6px 8px",borderRadius:"6px",border:"1px dashed var(--border)",fontSize:"11px",color:"var(--muted)",cursor:"text",marginTop:"6px"}});
      ph.textContent="+ Note…";
      ph.addEventListener("click",()=>{s.noteEdit=true;R();});
      panel.append(ph);
    } else {
      const ta=h("textarea",{id:"ni",placeholder:"Notes, liens, idées…",style:{width:"100%",padding:"6px 8px",borderRadius:"6px",border:"1.5px solid var(--accent)",fontSize:"12px",fontFamily:"inherit",outline:"none",color:"var(--text)",resize:"vertical",minHeight:"50px",maxHeight:"140px",lineHeight:"1.5",marginTop:"6px"}});
      ta.value=noteVal;
      ta.addEventListener("input",e=>{up(p.id,{note:e.target.value},true);});
      ta.addEventListener("blur",()=>{setTimeout(()=>{if(s.ed===p.id)s.noteEdit=false;R();},200);});
      panel.append(ta);
    }

    // Footer
    const ft=h("div",{style:{display:"flex",justifyContent:"flex-end",gap:"8px",paddingTop:"6px",marginTop:"6px"}});
    ft.append(
      h("button",{className:"btn-t",style:{color:"var(--red)",fontSize:"10px",padding:"2px 6px",minHeight:"auto"},onClick:()=>cfm("Supprimer ce projet ?",()=>{ps(s.p.filter(x=>x.id!==p.id));s.ed=null;})},"Supprimer"),
    );
    panel.append(ft);
    c.append(panel);
    row.append(c);
    return row;
  }

  // ═══ COLLAPSED STATE ═══
  const c=h("div",{className:"crd"});
  if(!isTodo)c.addEventListener("click",()=>{s.ed=p.id;s.nk="";s.noteEdit=false;R();});
  c.oncontextmenu=e=>{e.preventDefault();s.sel.has(p.id)?s.sel.delete(p.id):s.sel.add(p.id);R();};

  const {urgent:projUrgent}=parseTask(p.name);
  if(projUrgent)row.classList.add("row-urgent");
  const top=h("div",{className:"crd-top"});
  const nameEl=richTask(p.name,{});
  nameEl.className="crd-name"+(isDone?" x":"");
  top.append(nameEl);
  const meta=h("div",{className:"meta"});
  if(ts.length){
    const pg=h("div",{className:"prog"});
    pg.append(h("div",{className:"prog-f",style:{width:(dc/ts.length*100)+"%",background:dc===ts.length?"var(--green)":"var(--amber)"}}));
    meta.append(pg,h("span",{},dc+"/"+ts.length));
  }
  if(getNote(p)){
    const noteIcon=h("span",{style:{display:"inline-flex",alignItems:"center",gap:"3px"}});
    const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
    svg.setAttribute("width","14");svg.setAttribute("height","14");svg.setAttribute("viewBox","0 0 16 16");svg.setAttribute("fill","none");svg.style.color="var(--muted)";
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");

function rExp(){
  // Generate markdown from data
  function toMd(){
    let md="";
    const g={"In Progress":[],"To Do":[],"Done":[]};
    s.p.filter(p=>!p.hidden).forEach(p=>{if(g[p.status])g[p.status].push(p);});
    for(const[x,items]of Object.entries(g)){
      if(!items.length)continue;
      md+="## "+x+"\n\n";
      items.forEach(p=>{
        md+="### "+p.name+"\n";
        if(p.tasks?.length)p.tasks.forEach(t=>{
          md+="- ["+(tSt(t)==="done"?"x":tSt(t)==="progress"?"/":" ")+"] "+t.text+"\n";
        });
        const n=getNote(p);
        if(n)md+="\n"+n+"\n";
        md+="\n";
      });
    }
    return md.trim()+"\n";
  }
  // Parse markdown back to data
  function fromMd(md){
    const lines=md.split("\n");
    const projects=[];
    let curStatus=null,curProj=null,noteLines=[];
    function flushNote(){
      if(curProj&&noteLines.length){
        const txt=noteLines.join("\n").trim();
        if(txt)curProj.note=txt;
      }
      noteLines=[];
    }
    function flushProj(){
      flushNote();
      if(curProj)projects.push(curProj);
      curProj=null;
    }
    for(const line of lines){
      const statusM=line.match(/^## (In Progress|To Do|Done)/);
      if(statusM){flushProj();curStatus=statusM[1];continue;}
      const projM=line.match(/^### (.+)/);
      if(projM){
        flushProj();
        const existing=s.p.find(p=>p.name===projM[1].trim());
        curProj={id:existing?.id||gid(),name:projM[1].trim(),status:curStatus||"To Do",tasks:[],note:"",doneAt:existing?.doneAt||null,hidden:false};
        continue;
      }
      const taskM=line.match(/^- \[([ x\/])\] (.+)/);
      if(taskM&&curProj){
        flushNote();
        const st=taskM[1]==="x"?"done":taskM[1]==="/"?"progress":"todo";
        const existingT=(s.p.find(p=>p.name===curProj.name)?.tasks||[]).find(t=>t.text===taskM[2].trim());
        curProj.tasks.push({text:taskM[2].trim(),st,date:existingT?.date||td(),doneAt:st==="done"?(existingT?.doneAt||td()):undefined});
        continue;
      }
      if(curProj&&line.trim()===""&&!noteLines.length)continue;
      if(curProj)noteLines.push(line);
    }
    flushProj();
    // Keep hidden projects
    const hidden=s.p.filter(p=>p.hidden);
    return [...projects,...hidden];
  }

  const mdVal=toMd();
  const ov=h("div",{className:"ov",onClick:()=>{s.exp=false;R();}});
  const m=h("div",{className:"mod",style:{maxWidth:"560px"},onClick:e=>e.stopPropagation()});
  m.append(h("div",{className:"mod-hdr"},h("h3",{},"Markdown"),h("button",{className:"mod-x",onClick:()=>{s.exp=false;R();}},"✕")));

  const info=h("div",{style:{fontSize:"11px",color:"var(--muted)",marginBottom:"10px",lineHeight:"1.4"}});
  info.textContent="Édite directement. Format : ## Statut / ### Projet / - [x] tâche done / - [/] en cours / - [ ] à faire";
  m.append(info);

  const ta=h("textarea",{id:"md-edit",style:{width:"100%",padding:"14px",borderRadius:"10px",border:"1.5px solid var(--border)",fontSize:"13px",fontFamily:"monospace",lineHeight:"1.6",color:"var(--text)",background:"var(--bg)",outline:"none",resize:"vertical",minHeight:"300px",maxHeight:"60vh",transition:"border-color .15s"}});
  ta.value=mdVal;
  ta.addEventListener("focus",()=>{ta.style.borderColor="var(--accent)";});
  ta.addEventListener("blur",()=>{ta.style.borderColor="var(--border)";});
  m.append(ta);

  const btns=h("div",{style:{display:"flex",gap:"8px",justifyContent:"flex-end",marginTop:"12px"}});
  btns.append(
    h("button",{className:"btn btn-g",style:{fontSize:"12px"},onClick:()=>navigator.clipboard.writeText(ta.value)},"Copier"),
    h("button",{className:"btn btn-a",style:{fontSize:"12px"},onClick:()=>{
      const parsed=fromMd(ta.value);
      ps(parsed);
      s.exp=false;
    }},"Appliquer")
  );
  m.append(btns);
  ov.append(m);document.getElementById("app").append(ov);
}

function rCfm(){
  const ov=document.createElement("div");
  ov.className="ov";
  ov.style.zIndex="2000";
  ov.style.alignItems="center";
  ov.style.padding="16px";
  // Block ALL events from reaching layers below
  ov.addEventListener("click",e=>{e.stopPropagation();e.preventDefault();xcfm();});
  ov.addEventListener("touchend",e=>{e.stopPropagation();});
  const box=h("div",{className:"cfm"});
  box.addEventListener("click",e=>e.stopPropagation());
  box.addEventListener("touchend",e=>e.stopPropagation());
  box.append(
    h("p",{},s.cm),
    h("div",{style:{display:"flex",gap:"12px",justifyContent:"center"}},

      h("button",{className:"btn btn-r",style:{padding:"12px 28px",fontSize:"14px",minHeight:"48px"},onClick:e=>{e.stopPropagation();s.cf?.();xcfm();}},"Confirmer")
    )
  );
  ov.append(box);
  document.getElementById("app").append(ov);
}
